  <text x="785" y="135" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#4ade80">&#x2714; Confirmed</text>
  <text x="785" y="149" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">QKD deployed (SPDC factory scale)</text>

