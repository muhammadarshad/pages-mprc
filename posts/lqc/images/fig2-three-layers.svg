<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d20"/>
      <stop offset="100%" style="stop-color:#0d1530"/>
    </linearGradient>
    <!-- Layer gradients -->
    <linearGradient id="l1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="l2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <linearGradient id="l3grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Three Independent Security Layers</text>
  <text x="450" y="65" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#64748b">Each layer defeats a different class of adversary · defeating one still leaves two</text>

  <!-- ─── LAYER 1 ─── -->
  <rect x="60" y="95" width="780" height="120" rx="10" fill="url(#l1grad)" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
  <!-- Layer badge -->
  <rect x="60" y="95" width="72" height="120" rx="10" fill="#4f46e5" opacity="0.5"/>
  <text x="96" y="148" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c7d2fe" transform="rotate(-90,96,148)">L1</text>
  <!-- Layer content -->
  <text x="155" y="123" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#a5b4fc">Geometric Layer — Conjugate Birth Invariant</text>
  <text x="155" y="145" font-family="monospace" font-size="12" fill="#818cf8">d_A + d_B ≡ 0 (mod p)</text>
  <text x="155" y="166" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Key never transmitted · derived independently by each node from ring geometry</text>
  <text x="155" y="185" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Keyspace ≈ 2²⁵⁴ · no computational structure to attack</text>
  <!-- Adversary badge -->
  <rect x="620" y="111" width="200" height="88" rx="7" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" opacity="0.8"/>
  <text x="720" y="130" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b" letter-spacing="1">DEFEATS</text>
  <text x="720" y="150" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c7d2fe">Shor's algorithm</text>
  <text x="720" y="168" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c7d2fe">Grover's algorithm</text>
  <text x="720" y="186" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c7d2fe">Classical brute-force</text>

  <!-- Connector arrow L1 → L2 -->
  <line x1="450" y1="215" x2="450" y2="233" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ─── LAYER 2 ─── -->
  <rect x="60" y="233" width="780" height="120" rx="10" fill="url(#l2grad)" stroke="#0891b2" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="233" width="72" height="120" rx="10" fill="#0369a1" opacity="0.5"/>
  <text x="96" y="287" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#bae6fd" transform="rotate(-90,96,287)">L2</text>
  <text x="155" y="261" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#67e8f9">Physical Layer — Running Channel</text>
  <text x="155" y="283" font-family="monospace" font-size="12" fill="#22d3ee">Z₃ OTP: D(m,k) = (m−k) mod 3  ·  tension ratchet  ·  clock-drift detection</text>
  <text x="155" y="304" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Information-theoretic security · past keys unrecoverable after each ratchet tick</text>
  <text x="155" y="323" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">255 wrong-key tests: 0 accidental reads · 12/12 injection attacks detected</text>
  <rect x="620" y="249" width="200" height="88" rx="7" fill="#0c3045" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
  <text x="720" y="268" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b" letter-spacing="1">DEFEATS</text>
  <text x="720" y="288" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5f3fc">Wire interception</text>
  <text x="720" y="306" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5f3fc">Man-in-the-Middle</text>
  <text x="720" y="324" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5f3fc">Replay attacks</text>

  <!-- Connector arrow L2 → L3 -->
  <line x1="450" y1="353" x2="450" y2="371" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- ─── LAYER 3 ─── -->
  <rect x="60" y="371" width="780" height="120" rx="10" fill="url(#l3grad)" stroke="#0f766e" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="371" width="72" height="120" rx="10" fill="#0d5c55" opacity="0.5"/>
  <text x="96" y="426" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#99f6e4" transform="rotate(-90,96,426)">L3</text>
  <text x="155" y="399" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#5eead4">Temporal Layer — Domain Clock Shield</text>
  <text x="155" y="421" font-family="monospace" font-size="12" fill="#2dd4bf">κ(t) = (δ(t) × stride) mod 64  ·  gcd(stride, 63) = 1</text>
  <text x="155" y="442" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Birth tick t is internal — never transmitted, never observable from the wire</text>
  <text x="155" y="461" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">315 wrong-κ tests: 0 recoveries · 36 valid strides · full 63-state orbit</text>
  <rect x="620" y="387" width="200" height="88" rx="7" fill="#0a2e2b" stroke="#2dd4bf" stroke-width="1" opacity="0.8"/>
  <text x="720" y="406" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b" letter-spacing="1">DEFEATS</text>
  <text x="720" y="426" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#99f6e4">Zookeeper broadcast</text>
  <text x="720" y="444" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#99f6e4">intercept</text>
  <text x="720" y="462" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#99f6e4">(correct seed, wrong κ)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M2,0 L2,7 L7,3.5 L2,7 L-3,3.5 L2,7 L2,0" fill="none" stroke="#475569" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="450" y="520" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Layers are orthogonal — an attacker who breaks one still faces the remaining two</text>
  <text x="450" y="540" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Security is ontological impossibility, not computational hardness</text>
</svg>
