<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Deep space gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050818"/>
      <stop offset="50%" style="stop-color:#0a0f2e"/>
      <stop offset="100%" style="stop-color:#010510"/>
    </linearGradient>
    <!-- Ring glow -->
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <!-- Node glow left -->
    <radialGradient id="nodeGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#4f46e5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <!-- Node glow right -->
    <radialGradient id="nodeGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#0891b2;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </radialGradient>
    <!-- Text glow filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Central ring glow -->
  <ellipse cx="600" cy="315" rx="280" ry="280" fill="url(#ringGlow)"/>

  <!-- Z₂₅₆ ring — outer decorative circle -->
  <circle cx="600" cy="315" r="220" fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.5" stroke-dasharray="4 6"/>
  <circle cx="600" cy="315" r="190" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.3"/>

  <!-- 4 vacuum boundary markers on the ring -->
  <!-- Top vacuum (0) -->
  <circle cx="600" cy="95" r="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="600" y1="95" x2="600" y2="109" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <!-- Right vacuum (64) -->
  <circle cx="820" cy="315" r="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Bottom vacuum (128) -->
  <circle cx="600" cy="535" r="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <!-- Left vacuum (192) -->
  <circle cx="380" cy="315" r="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>

  <!-- Vacuum labels -->
  <text x="600" y="80" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">V₀</text>
  <text x="838" y="320" text-anchor="start" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">V₆₄</text>
  <text x="600" y="558" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">V₁₂₈</text>
  <text x="362" y="320" text-anchor="end" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.7">V₁₉₂</text>

  <!-- Active domain arcs (4 quadrants, avoiding vacuums) -->
  <!-- Q0: top-right quadrant arc -->
  <path d="M 600 101 A 214 214 0 0 1 814 315" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.6"/>
  <!-- Q1: bottom-right quadrant arc -->
  <path d="M 814 315 A 214 214 0 0 1 600 529" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>
  <!-- Q2: bottom-left quadrant arc -->
  <path d="M 600 529 A 214 214 0 0 1 386 315" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.6"/>
  <!-- Q3: top-left quadrant arc -->
  <path d="M 386 315 A 214 214 0 0 1 600 101" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>

  <!-- Alice node — left -->
  <ellipse cx="240" cy="315" rx="70" ry="70" fill="url(#nodeGlowL)" opacity="0.8"/>
  <circle cx="240" cy="315" r="42" fill="#0f172a" stroke="#6366f1" stroke-width="2"/>
  <text x="240" y="310" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#a5b4fc" filter="url(#textGlow)">ALICE</text>
  <text x="240" y="328" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">d_A</text>

  <!-- Bob node — right -->
  <ellipse cx="960" cy="315" rx="70" ry="70" fill="url(#nodeGlowR)" opacity="0.8"/>
  <circle cx="960" cy="315" r="42" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
  <text x="960" y="310" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#67e8f9" filter="url(#textGlow)">BOB</text>
  <text x="960" y="328" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">d_B</text>

  <!-- Crossed-out wire (the "never sent" concept) -->
  <line x1="310" y1="315" x2="890" y2="315" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 5" opacity="0.3"/>
  <!-- Red X through the middle of the wire -->
  <line x1="570" y1="290" x2="630" y2="340" stroke="#ef4444" stroke-width="3" opacity="0.9"/>
  <line x1="630" y1="290" x2="570" y2="340" stroke="#ef4444" stroke-width="3" opacity="0.9"/>

  <!-- "NO KEY TRANSMITTED" label on the wire -->
  <rect x="490" y="346" width="220" height="22" rx="4" fill="#0f172a" opacity="0.8"/>
  <text x="600" y="361" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#ef4444" letter-spacing="1.5">NO KEY TRANSMITTED</text>

  <!-- Internal derivation arrows (inside each node, pointing inward to ring) -->
  <path d="M 282 315 Q 380 250 490 290" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7" marker-end="url(#arrowIndigo)"/>
  <path d="M 918 315 Q 820 250 710 290" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.7" marker-end="url(#arrowCyan)"/>

  <defs>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8" opacity="0.7"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Centre ring label -->
  <text x="600" y="308" text-anchor="middle" font-family="monospace" font-size="13" fill="#94a3b8" opacity="0.9">Z₂₅₆</text>
  <text x="600" y="326" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">d_A + d_B ≡ 0 (mod p)</text>

  <!-- Born independently labels -->
  <text x="240" y="368" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6366f1" opacity="0.8">derives d_B = p − d_A</text>
  <text x="960" y="368" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#06b6d4" opacity="0.8">derives d_A = p − d_B</text>

  <!-- Top title -->
  <text x="600" y="62" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" filter="url(#textGlow)" letter-spacing="0.5">The Key That Was Never Sent</text>
  <text x="600" y="590" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" fill="#94a3b8" letter-spacing="2">MPRC FRAMEWORK · LATTICE QUANTUM CHANNEL · POST-QUANTUM CRYPTOGRAPHY</text>

  <!-- Small decorative stars -->
  <circle cx="80" cy="80" r="1.5" fill="#94a3b8" opacity="0.6"/>
  <circle cx="150" cy="200" r="1" fill="#94a3b8" opacity="0.4"/>
  <circle cx="1100" cy="120" r="1.5" fill="#94a3b8" opacity="0.6"/>
  <circle cx="1050" cy="480" r="1" fill="#94a3b8" opacity="0.4"/>
  <circle cx="100" cy="500" r="1" fill="#94a3b8" opacity="0.5"/>
  <circle cx="200" cy="560" r="1.5" fill="#94a3b8" opacity="0.3"/>
  <circle cx="1150" cy="300" r="1" fill="#94a3b8" opacity="0.5"/>
  <circle cx="50" cy="350" r="1" fill="#94a3b8" opacity="0.4"/>
</svg>
