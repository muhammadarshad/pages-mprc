  <text x="100" y="97" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">wave-particle</text>
  <text x="320" y="80" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Object literally in all states</text>
  <text x="320" y="97" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">until measured</text>
  <text x="560" y="80" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">Traversal below observer bandwidth</text>
  <text x="560" y="97" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">Fan blur — blades always definite</text>
  <rect x="700" y="68" width="170" height="38" rx="4" fill="#0d1a1a" stroke="#0891b2" stroke-width="1"/>
  <text x="785" y="83" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#22d3ee">&#x26A0; Pending</text>
  <text x="785" y="97" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">FSL threshold not yet measured</text>

