<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050818"/>
      <stop offset="100%" style="stop-color:#0d1530"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Anti-Phase Lock on Z&#x2082;&#x2085;&#x2086;</text>
  <text x="450" y="54" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#64748b">One 720&#xB0; spinor cycle splits into two conjugate 360&#xB0; halves at creation</text>

  <!-- Z256 ring, centered at 450,280 -->
  <circle cx="450" cy="285" r="165" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Upper arc: states 1-127, spin +1 (indigo) -->
  <path d="M 450 120 A 165 165 0 0 1 615 285" fill="none" stroke="#818cf8" stroke-width="5"/>
  <path d="M 615 285 A 165 165 0 0 1 450 450" fill="none" stroke="#818cf8" stroke-width="5" opacity="0.4" stroke-dasharray="6 4"/>
  <!-- Lower arc: states 129-255, spin -1 (cyan) -->
  <path d="M 450 120 A 165 165 0 0 0 285 285" fill="none" stroke="#22d3ee" stroke-width="5" opacity="0.4" stroke-dasharray="6 4"/>
  <path d="M 285 285 A 165 165 0 0 0 450 450" fill="none" stroke="#22d3ee" stroke-width="5"/>

  <!-- Vacuum markers at 0°,90°,180°,270° -->
  <circle cx="450" cy="120" r="8" fill="#0f172a" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="615" cy="285" r="8" fill="#0f172a" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="450" cy="450" r="8" fill="#0f172a" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="285" cy="285" r="8" fill="#0f172a" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Vacuum labels -->
  <text x="450" y="108" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444">V&#x2080; (0)</text>
  <text x="632" y="290" text-anchor="start" font-family="monospace" font-size="11" fill="#ef4444">V&#x2086;&#x2084;</text>
  <text x="450" y="472" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444">V&#x2081;&#x2082;&#x2088;</text>
  <text x="230" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#ef4444">V&#x2081;&#x2089;&#x2082;</text>

  <!-- Spinor A: at state ~40 (upper arc) -->
  <!-- state 40 → angle = 40/256 * 360 + 270 = 326.25° = 326° from +x axis → ~x = 450 + 165*cos(326°), y = 285 + 165*sin(326°) -->
  <!-- cos(326°)=0.829, sin(326°)=-0.559 → x=586.7, y=192.3 -->
  <circle cx="587" cy="193" r="13" fill="#818cf8" filter="url(#softglow)"/>
  <text x="587" y="178" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#a5b4fc">A</text>
  <text x="610" y="180" text-anchor="start" font-family="monospace" font-size="10" fill="#818cf8">p = &#x03C6;&#x1D40;</text>

  <!-- Spinor B: at state 40+128 = 168 (lower arc) -->
  <!-- state 168 → angle = 168/256 * 360 + 270 = 506.25° = 146.25° from +x → cos=−0.829, sin=0.559 → x=313.3, y=377.7 -->
  <circle cx="313" cy="377" r="13" fill="#22d3ee" filter="url(#softglow)"/>
  <text x="313" y="397" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#67e8f9">B</text>
  <text x="250" y="405" text-anchor="start" font-family="monospace" font-size="10" fill="#22d3ee">p+128 = &#x03C6;&#x1D40;+128</text>

  <!-- Dashed anti-phase diameter -->
  <line x1="587" y1="193" x2="313" y2="377" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.8"/>

  <!-- Arc labels -->
  <text x="565" y="220" text-anchor="start" font-family="'Segoe UI', sans-serif" font-size="11" fill="#818cf8" opacity="0.8">spin +1</text>
  <text x="270" y="360" text-anchor="end" font-family="'Segoe UI', sans-serif" font-size="11" fill="#22d3ee" opacity="0.8">spin &#x2212;1</text>

  <!-- t-cancellation derivation panel (right) -->
  <rect x="640" y="70" width="240" height="340" rx="8" fill="#08080f" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="760" y="94" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#c084fc">Birth Tick t Cancels</text>

  <text x="760" y="120" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">At creation event (t = common birth tick):</text>

  <rect x="655" y="128" width="210" height="28" rx="4" fill="#0d0a1f" stroke="#4c1d95" stroke-width="1"/>
  <text x="760" y="142" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">&#x03C6;&#x1D40; = t &#x2212; ang&#x1D40;</text>
  <text x="760" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">(Spinor A ring state)</text>

  <rect x="655" y="162" width="210" height="28" rx="4" fill="#0d0a1f" stroke="#4c1d95" stroke-width="1"/>
  <text x="760" y="176" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">&#x03C6;&#x1D2E; = t + 128 &#x2212; ang&#x1D2E;</text>
  <text x="760" y="189" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">(Spinor B ring state)</text>

  <text x="760" y="212" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">Phase difference at detector angles &#x03B1;, &#x03B2;:</text>

  <rect x="655" y="218" width="210" height="28" rx="4" fill="#120d20" stroke="#7c3aed" stroke-width="1"/>
  <text x="760" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">&#x0394; = &#x03C6;&#x1D40;&#x2212;ang&#x1D40; &#x2212; (&#x03C6;&#x1D2E;&#x2212;ang&#x1D2E;)</text>
  <text x="760" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#a855f7">&#x0394; = ang&#x1D2E; &#x2212; ang&#x1D40; &#x2212; 128</text>

  <line x1="655" y1="258" x2="865" y2="258" stroke="#4c1d95" stroke-width="1"/>
  <text x="760" y="276" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#e879f9">t cancels &#x2714;</text>
  <text x="760" y="293" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">No information about when the</text>
  <text x="760" y="307" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">pair was born survives in &#x0394;</text>

  <line x1="655" y1="320" x2="865" y2="320" stroke="#4c1d95" stroke-width="1"/>
  <text x="760" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">&#x0394; depends only on</text>
  <text x="760" y="356" text-anchor="middle" font-family="monospace" font-size="11" fill="#a855f7">ang&#x1D2E; &#x2212; ang&#x1D40;</text>
  <text x="760" y="372" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">detector geometry &#x2014; nothing else</text>

  <!-- Correlation formula at bottom -->
  <rect x="655" y="385" width="210" height="36" rx="5" fill="#0a1810" stroke="#16a34a" stroke-width="1.5"/>
  <text x="760" y="400" text-anchor="middle" font-family="monospace" font-size="11" fill="#4ade80">E(&#x03B1;,&#x03B2;) = cos(2&#x03C0;&#x0394;/256)</text>
  <text x="760" y="414" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">= cos(ang&#x1D2E; &#x2212; ang&#x1D40; &#x2212; 128)</text>

  <!-- Left panel: t cancels annotation -->
  <rect x="30" y="70" width="230" height="100" rx="8" fill="#08080f" stroke="#1e3a8a" stroke-width="1"/>
  <text x="145" y="92" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#93c5fd">No LHV violation</text>
  <text x="145" y="110" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Bell rules out local hidden</text>
  <text x="145" y="124" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">variables. t is NOT an LHV.</text>
  <text x="145" y="138" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">Anti-phase lock is a structural</text>
  <text x="145" y="152" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">constraint of one non-separable</text>
  <text x="145" y="166" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8">object &#x2014; not a per-particle value</text>
</svg>
