<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" style="background:#0a0f1e">
  <defs>
    <filter id="ca-glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Single object shape centred at 0,0 — same in both panels -->
    <g id="obj">
      <circle r="20" fill="#38bdf8" opacity="0.07"/>
      <circle r="13" fill="#38bdf8" opacity="0.22"/>
      <circle r="7"  fill="#38bdf8" opacity="0.75" filter="url(#ca-glow)"/>
      <circle r="3"  fill="#ffffff" opacity="0.92"/>
    </g>
    <path id="cam-path" d="M 85,228 L 365,228"/>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-family="Arial" font-size="11" fill="#3a4a60" letter-spacing="3">THE CAMERA — TRAJECTORY BLUR</text>
  <line x1="450" y1="46" x2="450" y2="428" stroke="#1a2540" stroke-width="1.5"/>

  <!-- ══ LEFT: SLOW SHUTTER — same object at every position the exposure integrated ══ -->
  <text x="225" y="63" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24" letter-spacing="4">SLOW SHUTTER</text>
  <line x1="50" y1="228" x2="400" y2="228" stroke="#1c2a42" stroke-width="1" stroke-dasharray="5,7"/>

  <!-- Ghost copies: 10 evenly-spaced positions along the path, tapering opacity left→right
       x = 85 + i*(280/9)  for i=0..9   →   85, 116, 147, 178, 209, 240, 271, 302, 333, 364 -->
  <use href="#obj" transform="translate(85,228)"  opacity="0.08"/>
  <use href="#obj" transform="translate(116,228)" opacity="0.11"/>
  <use href="#obj" transform="translate(147,228)" opacity="0.15"/>
  <use href="#obj" transform="translate(178,228)" opacity="0.20"/>
  <use href="#obj" transform="translate(209,228)" opacity="0.27"/>
  <use href="#obj" transform="translate(240,228)" opacity="0.36"/>
  <use href="#obj" transform="translate(271,228)" opacity="0.47"/>
  <use href="#obj" transform="translate(302,228)" opacity="0.60"/>
  <use href="#obj" transform="translate(333,228)" opacity="0.74"/>
  <use href="#obj" transform="translate(364,228)" opacity="0.90"/>

  <!-- Animated leading dot — the actual object moving through the frame -->
  <g>
    <animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#cam-path"/></animateMotion>
    <circle r="20" fill="#38bdf8" opacity="0.07"/>
    <circle r="13" fill="#38bdf8" opacity="0.22"/>
    <circle r="7"  fill="#38bdf8" opacity="0.75" filter="url(#ca-glow)"/>
    <circle r="3"  fill="#ffffff" opacity="0.92"/>
  </g>

  <!-- Wave appearance annotation -->
  <path d="M 78 278 Q 150 308 225 278 Q 300 248 372 278" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="3,5" opacity="0.45"/>
  <text x="225" y="303" text-anchor="middle" font-family="Arial" font-size="10" fill="#fbbf24" opacity="0.62">~ wave-like appearance</text>
  <line x1="288" y1="218" x2="318" y2="218" stroke="#38bdf8" stroke-width="1" opacity="0.45"/>
  <polygon points="318,215 325,218 318,221" fill="#38bdf8" opacity="0.45"/>

  <text x="225" y="352" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff" font-weight="bold">blur trail</text>
  <text x="225" y="372" text-anchor="middle" font-family="Arial" font-size="11" fill="#8892a8">same object — every position integrated</text>
  <text x="225" y="393" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24">u-spinor traversal trail</text>
  <text x="225" y="412" text-anchor="middle" font-family="Arial" font-size="10" fill="#445570" font-style="italic">same object — full path visible at once</text>

  <!-- ══ RIGHT: FAST SHUTTER — same object shape, one position only ══ -->
  <text x="675" y="63" text-anchor="middle" font-family="Arial" font-size="11" fill="#34d399" letter-spacing="4">FAST SHUTTER</text>
  <line x1="500" y1="228" x2="850" y2="228" stroke="#1c2a42" stroke-width="1" stroke-dasharray="5,7"/>

  <!-- Very faint ghost positions — object was here too, shutter didn't capture them -->
  <use href="#obj" transform="translate(552,228)" opacity="0.04"/>
  <use href="#obj" transform="translate(598,228)" opacity="0.04"/>
  <use href="#obj" transform="translate(644,228)" opacity="0.04"/>
  <use href="#obj" transform="translate(706,228)" opacity="0.04"/>
  <use href="#obj" transform="translate(752,228)" opacity="0.04"/>
  <use href="#obj" transform="translate(798,228)" opacity="0.04"/>

  <!-- Frozen dot: same obj shape, crisp, pulse animation (shutter-click) -->
  <g transform="translate(675,228)">
    <circle r="20" fill="#38bdf8"><animate attributeName="opacity" values="0.04;0.12;0.04" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle r="13" fill="#38bdf8"><animate attributeName="opacity" values="0.12;0.36;0.12" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle r="7"  fill="#38bdf8" filter="url(#ca-glow)">
      <animate attributeName="opacity" values="0.55;0.90;0.55;0.55;0.55" keyTimes="0;0.08;0.18;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3"  fill="#ffffff">
      <animate attributeName="opacity" values="0.75;1;0.75;0.75;0.75" keyTimes="0;0.08;0.18;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="738" y1="218" x2="768" y2="218" stroke="#38bdf8" stroke-width="1" opacity="0.45"/>
  <polygon points="768,215 775,218 768,221" fill="#38bdf8" opacity="0.45"/>

  <text x="675" y="352" text-anchor="middle" font-family="Arial" font-size="14" fill="#ffffff" font-weight="bold">frozen dot</text>
  <text x="675" y="372" text-anchor="middle" font-family="Arial" font-size="11" fill="#8892a8">same object — one instant captured</text>
  <text x="675" y="393" text-anchor="middle" font-family="Arial" font-size="11" fill="#34d399">same u-spinor — frozen</text>
  <text x="675" y="412" text-anchor="middle" font-family="Arial" font-size="10" fill="#445570" font-style="italic">same object — one instant captured</text>

  <text x="450" y="447" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a3550" letter-spacing="2">SAME OBJECT · SAME PATH · DIFFERENT TEMPORAL RESOLUTION</text>
</svg>
