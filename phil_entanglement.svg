<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" style="background:#0a0f1e">
  <defs>
    <radialGradient id="ent-vac" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="glA">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glB">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Full QH4 ring: clockwise from V0(top) -> V64(right) -> V128(bottom) -> V192(left) -> V0 -->
    <!-- Center (450,246) radius 118 -->
    <path id="ring-orbit" d="M 450,128 A 118,118 0 0,1 568,246 A 118,118 0 0,1 450,364 A 118,118 0 0,1 332,246 A 118,118 0 0,1 450,128"/>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-family="Arial" font-size="11" fill="#3a4a60" letter-spacing="3">ENTANGLEMENT — ONE SPLIT SPINOR · NO SIGNAL SENT</text>

  <!-- QH4 ring circle -->
  <circle cx="450" cy="246" r="118" fill="none" stroke="#1e2d45" stroke-width="1.5"/>

  <!-- Vacuum node glows -->
  <circle cx="450" cy="128" r="16" fill="url(#ent-vac)"/>
  <circle cx="568" cy="246" r="16" fill="url(#ent-vac)"/>
  <circle cx="450" cy="364" r="16" fill="url(#ent-vac)"/>
  <circle cx="332" cy="246" r="16" fill="url(#ent-vac)"/>

  <!-- Vacuum node dots -->
  <circle cx="450" cy="128" r="7" fill="#0a0f1e" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="450" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#fbbf24" opacity="0.72">V&#x2080;</text>
  <circle cx="568" cy="246" r="7" fill="#0a0f1e" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="583" y="250" text-anchor="start" font-family="Arial" font-size="9" fill="#fbbf24" opacity="0.72">V&#x2086;&#x2084;</text>
  <circle cx="450" cy="364" r="7" fill="#0a0f1e" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="450" y="381" text-anchor="middle" font-family="Arial" font-size="9" fill="#fbbf24" opacity="0.72">V&#x2081;&#x2082;&#x2088;</text>
  <circle cx="332" cy="246" r="7" fill="#0a0f1e" stroke="#fbbf24" stroke-width="1.8"/>
  <text x="317" y="250" text-anchor="end" font-family="Arial" font-size="9" fill="#fbbf24" opacity="0.72">V&#x2081;&#x2089;&#x2082;</text>

  <!-- ANTI-PHASE DIAMETER LINE: rotates at same angular velocity as the spinors -->
  <!-- Starts vertical (A at top V0, B at bottom V128) — same 6s period -->
  <line x1="450" y1="128" x2="450" y2="364" stroke="#2a3d55" stroke-width="1.2" stroke-dasharray="4,5">
    <animateTransform attributeName="transform" type="rotate" from="0 450 246" to="360 450 246" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- u-axis eye at center -->
  <circle cx="450" cy="246" r="11" fill="#07101e" stroke="#2a3850" stroke-width="1"/>
  <circle cx="450" cy="246" r="4" fill="#38bdf8" opacity="0.45"/>

  <!-- SPINOR A (cyan) — orbits full ring clockwise, 6s period, starts at V0(top) -->
  <circle r="16" fill="#38bdf8" opacity="0.14" filter="url(#glA)">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <circle r="9" fill="#38bdf8" opacity="0.88">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <circle r="4" fill="#ffffff" opacity="0.92">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <!-- Label "A" moves with spinor -->
  <text font-family="Arial" font-size="10" font-weight="bold" fill="#38bdf8" dx="13" dy="-6" text-anchor="start">
    <animateMotion dur="6s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>A
  </text>

  <!-- SPINOR B (gold) — same path, begin="-3s" keeps it exactly 180deg opposite to A -->
  <circle r="16" fill="#fbbf24" opacity="0.14" filter="url(#glB)">
    <animateMotion dur="6s" begin="-3s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <circle r="9" fill="#fbbf24" opacity="0.88">
    <animateMotion dur="6s" begin="-3s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <circle r="4" fill="#ffffff" opacity="0.92">
    <animateMotion dur="6s" begin="-3s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>
  </circle>
  <!-- Label "B" moves with spinor -->
  <text font-family="Arial" font-size="10" font-weight="bold" fill="#fbbf24" dx="13" dy="-6" text-anchor="start">
    <animateMotion dur="6s" begin="-3s" repeatCount="indefinite"><mpath href="#ring-orbit"/></animateMotion>B
  </text>

  <!-- Arc identity key: small legend text -->
  <text x="540" y="178" text-anchor="middle" font-family="Arial" font-size="9" fill="#38bdf8" opacity="0.55">Spinor A</text>
  <text x="360" y="326" text-anchor="middle" font-family="Arial" font-size="9" fill="#fbbf24" opacity="0.55">Spinor B</text>
  <text x="450" y="244" text-anchor="middle" font-family="Arial" font-size="8" fill="#2a3d55">128 apart</text>

  <!-- Lab boxes -->
  <rect x="762" y="108" width="130" height="88" rx="6" fill="#08121f" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="827" y="132" text-anchor="middle" font-family="Arial" font-size="11" fill="#38bdf8" font-weight="bold">Lab B</text>
  <text x="827" y="151" text-anchor="middle" font-family="Arial" font-size="10" fill="#8892a8">measures Spinor A</text>
  <text x="827" y="169" text-anchor="middle" font-family="Arial" font-size="10" fill="#34d399">result: spin-up &#x2191;</text>
  <text x="827" y="186" text-anchor="middle" font-family="Arial" font-size="9" fill="#445566" font-style="italic">wherever A is found</text>

  <rect x="8" y="284" width="130" height="88" rx="6" fill="#08121f" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="73" y="308" text-anchor="middle" font-family="Arial" font-size="11" fill="#fbbf24" font-weight="bold">Lab A</text>
  <text x="73" y="327" text-anchor="middle" font-family="Arial" font-size="10" fill="#8892a8">measures Spinor B</text>
  <text x="73" y="345" text-anchor="middle" font-family="Arial" font-size="10" fill="#34d399">result: spin-down &#x2193;</text>
  <text x="73" y="362" text-anchor="middle" font-family="Arial" font-size="9" fill="#445566" font-style="italic">always opposite to A</text>

  <!-- No signal badge -->
  <rect x="342" y="408" width="216" height="30" rx="5" fill="#0b1424" stroke="#243048" stroke-width="1"/>
  <text x="450" y="428" text-anchor="middle" font-family="Arial" font-size="11" fill="#445566" letter-spacing="2">NO SIGNAL SENT</text>

  <text x="450" y="465" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a3550" letter-spacing="1">ANTI-PHASE LOCK IS GEOMETRIC STRUCTURE — NOT COMMUNICATION</text>
</svg>
