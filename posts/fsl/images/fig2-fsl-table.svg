  <text x="100" y="201" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">duality</text>
  <text x="320" y="184" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Two fundamental natures</text>
  <text x="320" y="201" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">complementarity principle</text>
  <text x="560" y="184" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">Two projections, one traversal</text>
  <text x="560" y="201" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">slow shutter vs fast shutter</text>
