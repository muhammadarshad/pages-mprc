  <text x="52" y="457" font-family="'Segoe UI', sans-serif" font-size="10" fill="#4ade80">&#x2714; Confirmed</text>
  <circle cx="150" cy="453" r="6" fill="#0d1a1a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="162" y="457" font-family="'Segoe UI', sans-serif" font-size="10" fill="#22d3ee">&#x26A0; Pending measurement</text>
  <circle cx="320" cy="453" r="6" fill="#1a0a08" stroke="#f97316" stroke-width="1.5"/>
  <text x="332" y="457" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fb923c">&#x26A0; Open derivation</text>
  <text x="520" y="457" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">Empirical anchor: QKD (SPDC-based entanglement) commercially deployed and confirmed</text>
