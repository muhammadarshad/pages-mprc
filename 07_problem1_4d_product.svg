<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" style="background:#0a0f1e">
  <defs>
    <radialGradient id="outer_sphere" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2a5a8a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0d1e3a;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="inner_sphere" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3a8a6a;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d2a1a;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="centroid_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00CFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00CFFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="cglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rootglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">PROBLEM 1 — 4D POWER SYMMETRY</text>
  <text x="450" y="54" text-anchor="middle" font-family="Arial" font-size="13" fill="#4A9EFF" font-weight="bold">(x+3)(x+5)(x+7)(x+9) = 9</text>

  <g transform="translate(300, 330)">

    <!-- ── OUTER ELLIPSE (x+3)(x+9) = u²-9 ── -->
    <ellipse cx="0" cy="0" rx="230" ry="140" fill="url(#outer_sphere)" stroke="#2a6aaa" stroke-width="1.8" opacity="0.85"/>
    <!-- Outer ellipse rotated -->
    <ellipse cx="0" cy="0" rx="230" ry="80" fill="none" stroke="#2a5a8a" stroke-width="1" opacity="0.3" transform="rotate(-20)"/>

    <!-- ── INNER ELLIPSE (x+5)(x+7) = u²-1 ── -->
    <ellipse cx="0" cy="0" rx="150" ry="90" fill="url(#inner_sphere)" stroke="#2a8a6a" stroke-width="1.8" opacity="0.85"/>
    <!-- Inner ellipse rotated -->
    <ellipse cx="0" cy="0" rx="150" ry="55" fill="none" stroke="#2a7a5a" stroke-width="1" opacity="0.3" transform="rotate(-20)"/>

    <!-- ── U-AXIS (vertical thread through centroid) ── -->
    <line x1="0" y1="-280" x2="0" y2="280" stroke="#00CFFF" stroke-width="3" opacity="0.9" filter="url(#cglow)"/>
    <!-- Arrowhead top -->
    <polygon points="0,-285 -7,-268 7,-268" fill="#00CFFF" opacity="0.95"/>

    <!-- ── CENTROID POINT ── -->
    <circle cx="0" cy="0" r="18" fill="url(#centroid_glow)" opacity="0.6" filter="url(#cglow)"/>
    <circle cx="0" cy="0" r="8" fill="#00CFFF" opacity="0.95"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff"/>

    <!-- ── ROOT VECTORS ── -->
    <!-- +√10 root — upper right arrow -->
    <line x1="0" y1="0" x2="145" y2="-110" stroke="#FF6B4A" stroke-width="2.5" opacity="0.9" filter="url(#rootglow)"/>
    <polygon points="145,-110 128,-108 136,-95" fill="#FF6B4A" opacity="0.95"/>

    <!-- -√10 root — lower left arrow -->
    <line x1="0" y1="0" x2="-145" y2="110" stroke="#4AFF9E" stroke-width="2.5" opacity="0.9" filter="url(#rootglow)"/>
    <polygon points="-145,110 -128,108 -136,95" fill="#4AFF9E" opacity="0.95"/>

    <!-- ── LABELS ── -->
    <!-- Outer ellipse label -->
    <text x="-195" y="-90" font-family="Arial" font-size="11" fill="#4A9EFF" opacity="0.85">OUTER PLANE</text>
    <text x="-195" y="-74" font-family="Arial" font-size="11" fill="#4A9EFF" opacity="0.85">(x+3)(x+9) = u²-9</text>

    <!-- Inner ellipse label -->
    <text x="55" y="50" font-family="Arial" font-size="11" fill="#4AFF9E" opacity="0.85">INNER PLANE</text>
    <text x="55" y="64" font-family="Arial" font-size="11" fill="#4AFF9E" opacity="0.85">(x+5)(x+7) = u²-1</text>

    <!-- Centroid label -->
    <text x="14" y="-15" font-family="Arial" font-size="12" fill="#00CFFF" font-weight="bold">CENTROID</text>
    <text x="14" y="1" font-family="Arial" font-size="11" fill="#00CFFF">x = -6  (u = 0)</text>

    <!-- Root labels -->
    <text x="152" y="-118" font-family="Arial" font-size="13" fill="#FF6B4A" font-weight="bold">x = -6 + √10</text>
    <text x="-220" y="128" font-family="Arial" font-size="13" fill="#4AFF9E" font-weight="bold">x = -6 - √10</text>

    <!-- U-axis label -->
    <text x="10" y="-255" font-family="Arial" font-size="11" fill="#00CFFF">u-axis</text>
    <text x="10" y="-242" font-family="Arial" font-size="10" fill="#445">+1D thread</text>

  </g>

  <!-- ── STEP BOX LEFT ── -->
  <rect x="30" y="100" width="190" height="200" rx="6" fill="#0d1525" stroke="#1a3a5a" stroke-width="1"/>
  <text x="125" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF" font-weight="bold" letter-spacing="1">4-STEP METHOD</text>
  <line x1="40" y1="130" x2="210" y2="130" stroke="#1a3a5a" stroke-width="1"/>
  <text x="44" y="148" font-family="Arial" font-size="10" fill="#FF6B4A" font-weight="bold">1. OBSERVE</text>
  <text x="44" y="162" font-family="Arial" font-size="10" fill="#667">4D volume shape</text>
  <text x="44" y="182" font-family="Arial" font-size="10" fill="#FF6B4A" font-weight="bold">2. FIND CENTROID</text>
  <text x="44" y="196" font-family="Arial" font-size="10" fill="#667">pair outer × inner</text>
  <text x="44" y="196" font-family="Arial" font-size="10" fill="#667">pair outer × inner</text>
  <text x="44" y="216" font-family="Arial" font-size="10" fill="#FF6B4A" font-weight="bold">3. SHIFT TO u=0</text>
  <text x="44" y="230" font-family="Arial" font-size="10" fill="#667">let y = x²+12x+31</text>
  <text x="44" y="250" font-family="Arial" font-size="10" fill="#FF6B4A" font-weight="bold">4. COLLECT RESIDUE</text>
  <text x="44" y="264" font-family="Arial" font-size="10" fill="#667">y²-16 = 9 → y = ±5</text>
  <text x="44" y="278" font-family="Arial" font-size="10" fill="#667">roots = ±√10</text>

  <!-- ── DERIVATION BOX RIGHT ── -->
  <rect x="680" y="100" width="190" height="210" rx="6" fill="#0d1525" stroke="#1a3a5a" stroke-width="1"/>
  <text x="775" y="122" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF" font-weight="bold" letter-spacing="1">DERIVATION</text>
  <line x1="690" y1="130" x2="860" y2="130" stroke="#1a3a5a" stroke-width="1"/>
  <text x="694" y="150" font-family="Courier New" font-size="10" fill="#ccc">(x+3)(x+9) = u²-9</text>
  <text x="694" y="168" font-family="Courier New" font-size="10" fill="#ccc">(x+5)(x+7) = u²-1</text>
  <text x="694" y="186" font-family="Courier New" font-size="10" fill="#667">multiply:</text>
  <text x="694" y="202" font-family="Courier New" font-size="10" fill="#ccc">(u²-9)(u²-1) = 9</text>
  <text x="694" y="220" font-family="Courier New" font-size="10" fill="#667">let y = u²-5:</text>
  <text x="694" y="236" font-family="Courier New" font-size="10" fill="#ccc">(y-4)(y+4) = 9</text>
  <text x="694" y="252" font-family="Courier New" font-size="10" fill="#ccc">y² = 25, y = ±5</text>
  <text x="694" y="272" font-family="Courier New" font-size="11" fill="#ffffff" font-weight="bold">x = -6 ± √10</text>

  <!-- Bottom note -->
  <rect x="200" y="560" width="500" height="40" rx="5" fill="#0d1525" stroke="#1a3a5a" stroke-width="1"/>
  <text x="450" y="576" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">The centroid x=-6 is the u-axis — the thread that makes 4 factors one closed object</text>
  <text x="450" y="592" text-anchor="middle" font-family="Arial" font-size="11" fill="#667">Without finding u first, the quartic resists — with u, it collapses immediately</text>
</svg>
