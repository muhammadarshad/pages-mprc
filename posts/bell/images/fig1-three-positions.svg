<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050818"/>
      <stop offset="100%" style="stop-color:#0d1530"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bg)"/>

  <!-- Column headers -->
  <text x="150" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#fca5a5">Einstein</text>
  <text x="150" y="55" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#7f1d1d">Ruled Out</text>
  <rect x="30" y="18" width="240" height="440" rx="8" fill="#0a0505" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>

  <text x="450" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#67e8f9">Standard QM</text>
  <text x="450" y="55" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#0e7490">Copenhagen</text>
  <rect x="330" y="18" width="240" height="440" rx="8" fill="#050d14" stroke="#0891b2" stroke-width="1.5" opacity="0.8"/>

  <text x="750" y="38" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#4ade80">MPRC</text>
  <text x="750" y="55" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#16a34a">This Derivation</text>
  <rect x="630" y="18" width="240" height="440" rx="8" fill="#05100a" stroke="#16a34a" stroke-width="1.5" opacity="0.8"/>

  <!-- Row 1: Correlation source -->
  <text x="450" y="88" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#64748b">CORRELATION SOURCE</text>
  <line x1="30" y1="95" x2="870" y2="95" stroke="#1e293b" stroke-width="1"/>
  <text x="150" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fca5a5">Hidden variables</text>
  <text x="150" y="134" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">assigned at creation</text>
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#67e8f9">Wavefunction</text>
  <text x="450" y="134" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">collapses nonlocally</text>
  <text x="750" y="118" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#4ade80">Anti-phase lock</text>
  <text x="750" y="134" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">geometric at birth</text>

  <!-- Row 2: Signal after separation? -->
  <line x1="30" y1="148" x2="870" y2="148" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="166" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#64748b">SIGNAL AFTER SEPARATION?</text>
  <line x1="30" y1="173" x2="870" y2="173" stroke="#1e293b" stroke-width="1"/>
  <text x="150" y="196" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fca5a5">No</text>
  <text x="450" y="196" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#67e8f9">Effectively yes</text>
  <text x="450" y="212" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">(spooky action)</text>
  <text x="750" y="196" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#4ade80">No — never needed</text>

  <!-- Row 3: S value -->
  <line x1="30" y1="225" x2="870" y2="225" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="244" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#64748b">PREDICTED S</text>
  <line x1="30" y1="251" x2="870" y2="251" stroke="#1e293b" stroke-width="1"/>
  <text x="150" y="274" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#ef4444">S &#x2264; 2</text>
  <text x="150" y="291" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#7f1d1d">violated by experiment</text>
  <text x="450" y="274" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#22d3ee">S = 2&#x221A;2</text>
  <text x="450" y="291" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">Tsirelson bound (asserted)</text>
  <text x="750" y="274" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#4ade80">S = 2&#x221A;2</text>
  <text x="750" y="291" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#16a34a">derived from ring geometry</text>

  <!-- Row 4: Mechanism -->
  <line x1="30" y1="305" x2="870" y2="305" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="323" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#64748b">GEOMETRIC MECHANISM</text>
  <line x1="30" y1="330" x2="870" y2="330" stroke="#1e293b" stroke-width="1"/>
  <text x="150" y="353" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#fca5a5">None stated</text>
  <text x="450" y="353" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">None — postulated</text>
  <text x="750" y="348" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">cos(2&#x03C0;&#xD7;64/256) = 1/&#x221A;2</text>
  <text x="750" y="364" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#86efac">ring tick = &#x03C0;/2 natural step</text>

  <!-- Row 5: Falsifiability -->
  <line x1="30" y1="378" x2="870" y2="378" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="396" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#64748b">UNIQUE PREDICTIONS</text>
  <line x1="30" y1="403" x2="870" y2="403" stroke="#1e293b" stroke-width="1"/>
  <text x="150" y="425" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fca5a5">None (ruled out)</text>
  <text x="450" y="425" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">None beyond S value</text>
  <text x="750" y="420" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#4ade80">3 falsifiable predictions</text>
  <text x="750" y="436" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#86efac">Vacuum notches, non-uniform</text>
  <text x="750" y="449" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#86efac">emission, LIGO echoes</text>

  <!-- Title -->
  <text x="450" y="14" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#64748b">Three Positions on Bell Correlations</text>
</svg>
