<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680" style="background:#0a0f1e">
  <defs>
    <radialGradient id="ucenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="40%" style="stop-color:#4A9EFF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nodegrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="sharednode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <filter id="uglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="threadglow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bfieldgrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:0.12"/>
      <stop offset="70%" style="stop-color:#4A9EFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">QH4 LATTICE — u-CENTER THREADING</text>
  <text x="450" y="54" text-anchor="middle" font-family="Arial" font-size="11" fill="#445" letter-spacing="2">EACH u THREADS TO SHARED CORNER NODES — COLLECTIVE B FIELD EMERGES</text>

  <!-- 3x3 lattice grid centered -->
  <!-- Cell size: 160px, grid starts at offset -->
  <!-- Centers at: col 1=170, col2=330, col3=490, col4=650 -->
  <!--             row 1=140, row2=300, row3=460, row4=620 -->
  <!-- 3x3 cells means 4x4 corner nodes -->

  <g transform="translate(130, 100)">

    <!-- Cell size -->
    <!-- Each cell is 160x160 -->
    <!-- 3x3 grid = corners at x: 0,160,320,480 and y: 0,160,320,480 -->

    <!-- ═══════════════════════════════════════════ -->
    <!-- STEP 1: Draw cell edges (the 12-edge boxes) -->
    <!-- ═══════════════════════════════════════════ -->

    <!-- Horizontal edges -->
    <g stroke="#1a3a6a" stroke-width="1.2" opacity="0.6">
      <!-- Row 0 -->
      <line x1="0" y1="0" x2="160" y2="0"/>
      <line x1="160" y1="0" x2="320" y2="0"/>
      <line x1="320" y1="0" x2="480" y2="0"/>
      <!-- Row 1 -->
      <line x1="0" y1="160" x2="160" y2="160"/>
      <line x1="160" y1="160" x2="320" y2="160"/>
      <line x1="320" y1="160" x2="480" y2="160"/>
      <!-- Row 2 -->
      <line x1="0" y1="320" x2="160" y2="320"/>
      <line x1="160" y1="320" x2="320" y2="320"/>
      <line x1="320" y1="320" x2="480" y2="320"/>
      <!-- Row 3 -->
      <line x1="0" y1="480" x2="160" y2="480"/>
      <line x1="160" y1="480" x2="320" y2="480"/>
      <line x1="320" y1="480" x2="480" y2="480"/>
    </g>

    <!-- Vertical edges -->
    <g stroke="#1a3a6a" stroke-width="1.2" opacity="0.6">
      <!-- Col 0 -->
      <line x1="0" y1="0" x2="0" y2="160"/>
      <line x1="0" y1="160" x2="0" y2="320"/>
      <line x1="0" y1="320" x2="0" y2="480"/>
      <!-- Col 1 -->
      <line x1="160" y1="0" x2="160" y2="160"/>
      <line x1="160" y1="160" x2="160" y2="320"/>
      <line x1="160" y1="320" x2="160" y2="480"/>
      <!-- Col 2 -->
      <line x1="320" y1="0" x2="320" y2="160"/>
      <line x1="320" y1="160" x2="320" y2="320"/>
      <line x1="320" y1="320" x2="320" y2="480"/>
      <!-- Col 3 -->
      <line x1="480" y1="0" x2="480" y2="160"/>
      <line x1="480" y1="160" x2="480" y2="320"/>
      <line x1="480" y1="320" x2="480" y2="480"/>
    </g>

    <!-- ═══════════════════════════════════════════════════════ -->
    <!-- STEP 2: Draw B-field halo around each u center         -->
    <!-- Collective overlapping tension fields = magnetic shield -->
    <!-- ═══════════════════════════════════════════════════════ -->

    <!-- B field halos — each u center radiates outward -->
    <!-- 3x3 = 9 cells, centers at (80+col*160, 80+row*160) -->
    <g opacity="0.7">
      <!-- Row 0 -->
      <circle cx="80"  cy="80"  r="75" fill="url(#bfieldgrad)"/>
      <circle cx="240" cy="80"  r="75" fill="url(#bfieldgrad)"/>
      <circle cx="400" cy="80"  r="75" fill="url(#bfieldgrad)"/>
      <!-- Row 1 -->
      <circle cx="80"  cy="240" r="75" fill="url(#bfieldgrad)"/>
      <circle cx="240" cy="240" r="75" fill="url(#bfieldgrad)"/>
      <circle cx="400" cy="240" r="75" fill="url(#bfieldgrad)"/>
      <!-- Row 2 -->
      <circle cx="80"  cy="400" r="75" fill="url(#bfieldgrad)"/>
      <circle cx="240" cy="400" r="75" fill="url(#bfieldgrad)"/>
      <circle cx="400" cy="400" r="75" fill="url(#bfieldgrad)"/>
    </g>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- STEP 3: Tension threads — u to corners             -->
    <!-- Each u has 4 threads to its 4 corner nodes         -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Threads for each of 9 cells -->
    <!-- Cell (row, col): u at (80+col*160, 80+row*160) -->
    <!-- Corners at (col*160, row*160), ((col+1)*160, row*160), etc -->

    <g stroke="#4A9EFF" stroke-width="1.2" opacity="0.5" filter="url(#threadglow)">

      <!-- Cell (0,0): u=(80,80), corners=(0,0),(160,0),(0,160),(160,160) -->
      <line x1="80" y1="80" x2="0" y2="0"/>
      <line x1="80" y1="80" x2="160" y2="0"/>
      <line x1="80" y1="80" x2="0" y2="160"/>
      <line x1="80" y1="80" x2="160" y2="160"/>

      <!-- Cell (0,1): u=(240,80) -->
      <line x1="240" y1="80" x2="160" y2="0"/>
      <line x1="240" y1="80" x2="320" y2="0"/>
      <line x1="240" y1="80" x2="160" y2="160"/>
      <line x1="240" y1="80" x2="320" y2="160"/>

      <!-- Cell (0,2): u=(400,80) -->
      <line x1="400" y1="80" x2="320" y2="0"/>
      <line x1="400" y1="80" x2="480" y2="0"/>
      <line x1="400" y1="80" x2="320" y2="160"/>
      <line x1="400" y1="80" x2="480" y2="160"/>

      <!-- Cell (1,0): u=(80,240) -->
      <line x1="80" y1="240" x2="0" y2="160"/>
      <line x1="80" y1="240" x2="160" y2="160"/>
      <line x1="80" y1="240" x2="0" y2="320"/>
      <line x1="80" y1="240" x2="160" y2="320"/>

      <!-- Cell (1,1): u=(240,240) — CENTER CELL highlighted -->
      <line x1="240" y1="240" x2="160" y2="160"/>
      <line x1="240" y1="240" x2="320" y2="160"/>
      <line x1="240" y1="240" x2="160" y2="320"/>
      <line x1="240" y1="240" x2="320" y2="320"/>

      <!-- Cell (1,2): u=(400,240) -->
      <line x1="400" y1="240" x2="320" y2="160"/>
      <line x1="400" y1="240" x2="480" y2="160"/>
      <line x1="400" y1="240" x2="320" y2="320"/>
      <line x1="400" y1="240" x2="480" y2="320"/>

      <!-- Cell (2,0): u=(80,400) -->
      <line x1="80" y1="400" x2="0" y2="320"/>
      <line x1="80" y1="400" x2="160" y2="320"/>
      <line x1="80" y1="400" x2="0" y2="480"/>
      <line x1="80" y1="400" x2="160" y2="480"/>

      <!-- Cell (2,1): u=(240,400) -->
      <line x1="240" y1="400" x2="160" y2="320"/>
      <line x1="240" y1="400" x2="320" y2="320"/>
      <line x1="240" y1="400" x2="160" y2="480"/>
      <line x1="240" y1="400" x2="320" y2="480"/>

      <!-- Cell (2,2): u=(400,400) -->
      <line x1="400" y1="400" x2="320" y2="320"/>
      <line x1="400" y1="400" x2="480" y2="320"/>
      <line x1="400" y1="400" x2="320" y2="480"/>
      <line x1="400" y1="400" x2="480" y2="480"/>

    </g>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- STEP 4: Corner nodes — shared between cells        -->
    <!-- These are the handoff points between u-centers     -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Interior shared corners (connected to 4 u-centers each) — gold -->
    <!-- Interior nodes: (160,160), (320,160), (160,320), (320,320) -->
    <g filter="url(#nodeglow)">
      <circle cx="160" cy="160" r="10" fill="url(#sharednode)" opacity="0.7"/>
      <circle cx="160" cy="160" r="6" fill="#FFD700" opacity="0.95"/>
      <circle cx="320" cy="160" r="10" fill="url(#sharednode)" opacity="0.7"/>
      <circle cx="320" cy="160" r="6" fill="#FFD700" opacity="0.95"/>
      <circle cx="160" cy="320" r="10" fill="url(#sharednode)" opacity="0.7"/>
      <circle cx="160" cy="320" r="6" fill="#FFD700" opacity="0.95"/>
      <circle cx="320" cy="320" r="10" fill="url(#sharednode)" opacity="0.7"/>
      <circle cx="320" cy="320" r="6" fill="#FFD700" opacity="0.95"/>
    </g>

    <!-- Edge shared corners (connected to 2 u-centers) — orange -->
    <g filter="url(#nodeglow)">
      <!-- Top edge -->
      <circle cx="160" cy="0" r="7" fill="#FF9A4A" opacity="0.9"/>
      <circle cx="320" cy="0" r="7" fill="#FF9A4A" opacity="0.9"/>
      <!-- Bottom edge -->
      <circle cx="160" cy="480" r="7" fill="#FF9A4A" opacity="0.9"/>
      <circle cx="320" cy="480" r="7" fill="#FF9A4A" opacity="0.9"/>
      <!-- Left edge -->
      <circle cx="0" cy="160" r="7" fill="#FF9A4A" opacity="0.9"/>
      <circle cx="0" cy="320" r="7" fill="#FF9A4A" opacity="0.9"/>
      <!-- Right edge -->
      <circle cx="480" cy="160" r="7" fill="#FF9A4A" opacity="0.9"/>
      <circle cx="480" cy="320" r="7" fill="#FF9A4A" opacity="0.9"/>
    </g>

    <!-- Corner nodes (connected to 1 u-center) — red -->
    <g filter="url(#nodeglow)">
      <circle cx="0"   cy="0"   r="6" fill="#FF6B6B" opacity="0.85"/>
      <circle cx="480" cy="0"   r="6" fill="#FF6B6B" opacity="0.85"/>
      <circle cx="0"   cy="480" r="6" fill="#FF6B6B" opacity="0.85"/>
      <circle cx="480" cy="480" r="6" fill="#FF6B6B" opacity="0.85"/>
    </g>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- STEP 5: u-centers — the spinor eyes                -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- All 9 u-centers -->
    <!-- Regular cells: smaller eye -->
    <g>
      <!-- Row 0 -->
      <!-- u(80,80) -->
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,80)"/>
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,80)"/>
      <circle cx="80" cy="80" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="80" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- u(240,80) -->
      <path d="M 240,-8 A 18,18 0 0,1 240,8 A 18,18 0 0,1 240,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,80)"/>
      <path d="M 240,-8 A 18,18 0 0,1 240,8 A 18,18 0 0,1 240,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,80)"/>
      <circle cx="240" cy="80" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="240" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- u(400,80) -->
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,80)"/>
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,80)"/>
      <circle cx="400" cy="80" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="400" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- Row 1 -->
      <!-- u(80,240) -->
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,240)"/>
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,240)"/>
      <circle cx="80" cy="240" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="80" cy="240" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- u(240,240) — CENTER CELL — highlighted brighter -->
      <path d="M 240,-12 A 24,24 0 0,1 240,12 A 24,24 0 0,1 240,-12 Z" fill="#1a4a8a" opacity="0.85" transform="translate(0,240)"/>
      <path d="M 240,-12 A 24,24 0 0,1 240,12 A 24,24 0 0,1 240,-12 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9" transform="translate(0,240)"/>
      <circle cx="240" cy="240" r="8" fill="url(#ucenter)" opacity="0.95" filter="url(#uglow)"/>
      <circle cx="240" cy="240" r="4" fill="#ffffff" opacity="1"/>

      <!-- u(400,240) -->
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,240)"/>
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,240)"/>
      <circle cx="400" cy="240" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="400" cy="240" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- Row 2 -->
      <!-- u(80,400) -->
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,400)"/>
      <path d="M 80,-8 A 18,18 0 0,1 80,8 A 18,18 0 0,1 80,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,400)"/>
      <circle cx="80" cy="400" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="80" cy="400" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- u(240,400) -->
      <path d="M 240,-8 A 18,18 0 0,1 240,8 A 18,18 0 0,1 240,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,400)"/>
      <path d="M 240,-8 A 18,18 0 0,1 240,8 A 18,18 0 0,1 240,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,400)"/>
      <circle cx="240" cy="400" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="240" cy="400" r="2.5" fill="#ffffff" opacity="0.9"/>

      <!-- u(400,400) -->
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="#1a3a6a" opacity="0.7" transform="translate(0,400)"/>
      <path d="M 400,-8 A 18,18 0 0,1 400,8 A 18,18 0 0,1 400,-8 Z" fill="none" stroke="#4A9EFF" stroke-width="1.5" opacity="0.8" transform="translate(0,400)"/>
      <circle cx="400" cy="400" r="5" fill="url(#ucenter)" opacity="0.8" filter="url(#uglow)"/>
      <circle cx="400" cy="400" r="2.5" fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- Center cell annotation -->
    <!-- ═══════════════════════════════════════════════════ -->
    <rect x="165" y="165" width="150" height="150" rx="4"
          fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>

    <!-- u label on center -->
    <text x="258" y="237" font-family="Arial" font-size="13" fill="#ffffff" opacity="0.9" font-style="italic">u</text>

    <!-- Thread label on center cell -->
    <text x="272" y="200" font-family="Arial" font-size="9" fill="#6AB8FF" opacity="0.7">[(a+b)²(c+d)²]²</text>

  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- External annotations                           -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- u-center label -->
  <line x1="370" y1="340" x2="430" y2="370" stroke="#4A9EFF" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="310" y="332" font-family="Arial" font-size="11" fill="#4A9EFF">spinor eye</text>
  <text x="310" y="346" font-family="Arial" font-size="11" fill="#4A9EFF">u-center</text>
  <text x="310" y="360" font-family="Arial" font-size="10" fill="#445">720° oloid</text>

  <!-- Shared node label -->
  <line x1="610" y1="300" x2="650" y2="300" stroke="#FFD700" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="660" y="295" font-family="Arial" font-size="11" fill="#FFD700">shared corner</text>
  <text x="660" y="308" font-family="Arial" font-size="10" fill="#887730">4 u-centers meet</text>
  <text x="660" y="321" font-family="Arial" font-size="10" fill="#887730">tension handoff</text>

  <!-- Thread label -->
  <line x1="610" y1="220" x2="650" y2="220" stroke="#4A9EFF" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="660" y="215" font-family="Arial" font-size="11" fill="#4A9EFF">tension thread</text>
  <text x="660" y="228" font-family="Arial" font-size="10" fill="#445">+1D closing force</text>

  <!-- B field label -->
  <line x1="610" y1="400" x2="650" y2="400" stroke="#4A9EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <text x="660" y="395" font-family="Arial" font-size="11" fill="#3a7abf">B field halo</text>
  <text x="660" y="408" font-family="Arial" font-size="10" fill="#2a5a8f">collective rotation</text>
  <text x="660" y="421" font-family="Arial" font-size="10" fill="#2a5a8f">of u-centers</text>

  <!-- Edge node label -->
  <line x1="130" y1="260" x2="95" y2="300" stroke="#FF9A4A" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="30" y="255" font-family="Arial" font-size="10" fill="#FF9A4A">edge node</text>
  <text x="30" y="268" font-family="Arial" font-size="10" fill="#664020">2 u-centers</text>

  <!-- Corner node label -->
  <line x1="130" y1="100" x2="134" y2="105" stroke="#FF6B6B" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="30" y="95" font-family="Arial" font-size="10" fill="#FF6B6B">corner node</text>
  <text x="30" y="108" font-family="Arial" font-size="10" fill="#663030">1 u-center</text>

  <!-- Key insight box -->
  <rect x="130" y="606" width="640" height="42" rx="5" fill="#0d1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="450" y="622" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">The lattice holds not because edges are rigid — but because every u threads to its neighbors through shared nodes</text>
  <text x="450" y="638" text-anchor="middle" font-family="Arial" font-size="11" fill="#667">Collective rotation of u-centers through shared corners generates the magnetic shielding B in the metals equation</text>
</svg>
