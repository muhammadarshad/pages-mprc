  <text x="100" y="357" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">off-shell</text>
  <text x="320" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Off-shell, violate E-momentum</text>
  <text x="320" y="357" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">special unobservable category</text>
  <text x="560" y="340" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">Off-bandwidth, not off-shell</text>
  <text x="560" y="357" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">same category as all real objects</text>
