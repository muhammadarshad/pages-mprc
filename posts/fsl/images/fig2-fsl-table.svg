  <text x="785" y="343" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#fb923c">&#x26A0; Staged</text>
  <text x="785" y="357" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">Formal derivation pending</text>

