  <text x="785" y="187" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#22d3ee">&#x26A0; Pending</text>
  <text x="785" y="201" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">Requires FSL bandwidth test</text>

