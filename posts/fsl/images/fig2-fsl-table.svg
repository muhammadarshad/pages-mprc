  <text x="100" y="305" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">&#x394;x&#xB7;&#x394;p &#x2265; &#x0127;/2</text>
  <text x="320" y="288" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Fundamental ontological limit</text>
  <text x="320" y="305" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">cannot know both simultaneously</text>
  <text x="560" y="288" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">Observer bandwidth &#x2192; trade-off</text>
  <text x="560" y="305" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">fast shutter &#x2194; position; slow &#x2194; frequency</text>
  <rect x="700" y="276" width="170" height="38" rx="4" fill="#0d1a1a" stroke="#0891b2" stroke-width="1"/>
  <text x="785" y="291" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#22d3ee">&#x26A0; Pending</text>
  <text x="785" y="305" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">Formal &#x0127;/2 derivation in progress</text>

