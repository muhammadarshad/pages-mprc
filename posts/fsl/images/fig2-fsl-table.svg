  <rect x="15" y="114" width="870" height="52" rx="0" fill="#050d14"/>
  <text x="100" y="132" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#67e8f9">Entanglement</text>
  <text x="100" y="149" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">nonlocal corr.</text>
  <text x="320" y="132" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Spooky action at distance</text>
  <text x="320" y="149" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">collapse of joint wavefunction</text>
  <text x="560" y="132" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">One 720&#xB0; spinor, two 360&#xB0; halves</text>
  <text x="560" y="149" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">anti-phase lock at birth, no signal</text>
