  <text x="100" y="409" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">Casimir, ZPE</text>
  <text x="320" y="392" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Virtual pairs from empty vacuum</text>
  <text x="320" y="409" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">infinite zero-point energy</text>
  <text x="560" y="392" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc">Ring vacuum states {0,64,128,192}</text>
  <text x="560" y="409" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">finite, discrete — 4 exact points</text>
  <rect x="700" y="380" width="170" height="38" rx="4" fill="#0a1810" stroke="#16a34a" stroke-width="1"/>
  <text x="785" y="395" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#4ade80">&#x2714; Partial</text>
  <text x="785" y="409" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">Casimir matches; ZPE derivation open</text>

