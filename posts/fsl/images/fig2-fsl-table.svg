  <text x="785" y="239" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#fb923c">&#x26A0; Open</text>
  <text x="785" y="253" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="8" fill="#475569">&#x03C6; accumulation threshold not calc.</text>

