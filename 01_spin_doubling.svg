<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" style="background:#0a0f1e">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">THE ATOM'S OWN RESOLUTION</text>

  <!-- Steps: x positions -->
  <!-- 2^1=2, 2^2=4, 2^3=8, 2^4=16, 2^6=64, 2^8=256 -->

  <!-- Connecting line -->
  <line x1="80" y1="160" x2="820" y2="160" stroke="#1a2540" stroke-width="2"/>

  <!-- Node data: x, value, label, size, highlight -->
  <!-- Node 1: 2 -->
  <circle cx="80" cy="160" r="22" fill="none" stroke="#2a4a7f" stroke-width="1.5"/>
  <text x="80" y="165" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4A9EFF">2</text>
  <text x="80" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#556">2¹</text>
  <text x="80" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">Spin</text>
  <text x="80" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">↑↓</text>

  <!-- Arrow -->
  <text x="148" y="155" text-anchor="middle" font-family="Arial" font-size="20" fill="#2a4a7f">×2</text>

  <!-- Node 2: 4 -->
  <circle cx="216" cy="160" r="25" fill="none" stroke="#2a4a7f" stroke-width="1.5"/>
  <text x="216" y="165" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4A9EFF">4</text>
  <text x="216" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#556">2²</text>
  <text x="216" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">2 electrons</text>
  <text x="216" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">2 spins</text>

  <!-- Arrow -->
  <text x="284" y="155" text-anchor="middle" font-family="Arial" font-size="20" fill="#2a4a7f">×2</text>

  <!-- Node 3: 8 -->
  <circle cx="352" cy="160" r="28" fill="none" stroke="#2a5a9f" stroke-width="1.5"/>
  <text x="352" y="165" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4A9EFF">8</text>
  <text x="352" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#556">2³</text>
  <text x="352" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">1 orbital</text>
  <text x="352" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">complete</text>

  <!-- Arrow -->
  <text x="416" y="155" text-anchor="middle" font-family="Arial" font-size="20" fill="#2a4a7f">×2</text>

  <!-- Node 4: 16 -->
  <circle cx="480" cy="160" r="30" fill="none" stroke="#2a6abf" stroke-width="1.5"/>
  <text x="480" y="165" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#4A9EFF">16</text>
  <text x="480" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#556">2⁴</text>
  <text x="480" y="218" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">s and p</text>
  <text x="480" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">subshells</text>

  <!-- Arrow with skip note -->
  <text x="560" y="148" text-anchor="middle" font-family="Arial" font-size="20" fill="#2a4a7f">×4</text>
  <text x="560" y="166" text-anchor="middle" font-family="Arial" font-size="10" fill="#334">(2⁵,2⁶)</text>

  <!-- Node 5: 64 -->
  <circle cx="640" cy="160" r="34" fill="none" stroke="#3a7adf" stroke-width="2"/>
  <text x="640" y="165" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#4A9EFF">64</text>
  <text x="640" y="204" text-anchor="middle" font-family="Arial" font-size="11" fill="#556">2⁶</text>
  <text x="640" y="222" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">1 quadrant</text>
  <text x="640" y="234" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">shell closure</text>

  <!-- Arrow -->
  <text x="720" y="148" text-anchor="middle" font-family="Arial" font-size="20" fill="#2a4a7f">×4</text>
  <text x="720" y="166" text-anchor="middle" font-family="Arial" font-size="10" fill="#334">(2⁷,2⁸)</text>

  <!-- Node 6: 256 — highlighted -->
  <circle cx="820" cy="160" r="44" fill="url(#glow1)" stroke="#4A9EFF" stroke-width="2.5" filter="url(#blur1)"/>
  <circle cx="820" cy="160" r="38" fill="none" stroke="#4A9EFF" stroke-width="1.5"/>
  <text x="820" y="165" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#ffffff">256</text>
  <text x="820" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">2⁸</text>
  <text x="820" y="228" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">Full ring</text>
  <text x="820" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">4 quadrants</text>

  <!-- Bottom note -->
  <text x="450" y="290" text-anchor="middle" font-family="Arial" font-size="12" fill="#445" font-style="italic">256 is not a computational choice — it is the atom's own resolution, inherited by digital computing</text>
</svg>
