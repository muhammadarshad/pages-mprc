<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440" style="background:#0a0f1e">
  <defs>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="metalgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0d1e3a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="gasgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a3a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0d2a1a;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">THE Z-CANCELLATION</text>
  <text x="450" y="58" text-anchor="middle" font-family="Arial" font-size="11" fill="#445" letter-spacing="2">WHY CHARGE DISAPPEARS IN THE GAS PHASE</text>

  <!-- LEFT PANEL: METAL -->
  <rect x="40" y="80" width="370" height="310" rx="8" fill="url(#metalgrad)" stroke="#2a4a8f" stroke-width="1.5"/>

  <!-- Metal label -->
  <text x="225" y="108" text-anchor="middle" font-family="Arial" font-size="13" fill="#4A9EFF" font-weight="bold" letter-spacing="2">METAL / SOLID</text>

  <!-- Lattice visualization -->
  <g transform="translate(225, 185)" opacity="0.9">
    <!-- Lattice grid dots -->
    <g fill="#2a5a9f">
      <circle cx="-60" cy="-40" r="5"/>
      <circle cx="0" cy="-40" r="5"/>
      <circle cx="60" cy="-40" r="5"/>
      <circle cx="-60" cy="0" r="5"/>
      <circle cx="0" cy="0" r="8" fill="#4A9EFF" filter="url(#glow3)"/>
      <circle cx="60" cy="0" r="5"/>
      <circle cx="-60" cy="40" r="5"/>
      <circle cx="0" cy="40" r="5"/>
      <circle cx="60" cy="40" r="5"/>
    </g>
    <!-- Lattice lines -->
    <g stroke="#1a3a6f" stroke-width="1" opacity="0.5">
      <line x1="-60" y1="-40" x2="60" y2="-40"/>
      <line x1="-60" y1="0" x2="60" y2="0"/>
      <line x1="-60" y1="40" x2="60" y2="40"/>
      <line x1="-60" y1="-40" x2="-60" y2="40"/>
      <line x1="0" y1="-40" x2="0" y2="40"/>
      <line x1="60" y1="-40" x2="60" y2="40"/>
    </g>
    <!-- B field arrows radiating from center -->
    <g stroke="#4A9EFF" stroke-width="1.5" opacity="0.6" marker-end="url(#arrow)">
      <line x1="0" y1="0" x2="-55" y2="-35"/>
      <line x1="0" y1="0" x2="55" y2="-35"/>
      <line x1="0" y1="0" x2="-55" y2="35"/>
      <line x1="0" y1="0" x2="55" y2="35"/>
    </g>
    <text x="0" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">B built by lattice</text>
    <text x="0" y="88" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">B scales with Z</text>
  </g>

  <!-- Metal equation -->
  <rect x="65" y="295" width="320" height="70" rx="6" fill="#0a1525" stroke="#1a3a6f" stroke-width="1"/>
  <text x="225" y="320" text-anchor="middle" font-family="Courier New" font-size="13" fill="#ffffff" font-weight="bold">S = E · B · r² / (Z · M)</text>
  <text x="225" y="342" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">Z present — charge controls stability</text>
  <text x="225" y="357" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF">B_metal = σ_lattice / r²  (Z-dependent)</text>

  <!-- CENTER: Divider with arrow -->
  <line x1="450" y1="100" x2="450" y2="380" stroke="#1a2a4a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="230" text-anchor="middle" font-family="Arial" font-size="28" fill="#2a4a7f">→</text>
  <text x="450" y="255" text-anchor="middle" font-family="Arial" font-size="9" fill="#334">remove</text>
  <text x="450" y="268" text-anchor="middle" font-family="Arial" font-size="9" fill="#334">lattice</text>

  <!-- RIGHT PANEL: GAS -->
  <rect x="490" y="80" width="370" height="310" rx="8" fill="url(#gasgrad)" stroke="#2a8a5f" stroke-width="1.5"/>

  <!-- Gas label -->
  <text x="675" y="108" text-anchor="middle" font-family="Arial" font-size="13" fill="#4AFF9E" font-weight="bold" letter-spacing="2">GAS PHASE</text>

  <!-- Free atom visualization -->
  <g transform="translate(675, 185)">
    <!-- Isolated atom -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#2a8a5f" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#4AFF9E" opacity="0.8" filter="url(#glow3)"/>
    <!-- Electron orbit -->
    <ellipse cx="0" cy="0" rx="50" ry="22" fill="none" stroke="#2a6a4f" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- Electron -->
    <circle cx="50" cy="0" r="4" fill="#4AFF9E" opacity="0.9"/>
    <!-- Confinement boundary -->
    <rect x="-90" y="-70" width="180" height="140" rx="8" fill="none" stroke="#1a4a3a" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="80" y="-55" font-family="Arial" font-size="9" fill="#2a6a4f">r</text>
    <!-- Temperature indicator -->
    <text x="0" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#4AFF9E">B from confinement + T</text>
    <text x="0" y="98" text-anchor="middle" font-family="Arial" font-size="10" fill="#4AFF9E">B independent of Z</text>
  </g>

  <!-- Gas equation -->
  <rect x="515" y="295" width="320" height="70" rx="6" fill="#0a1a15" stroke="#1a4a3a" stroke-width="1"/>
  <text x="675" y="316" text-anchor="middle" font-family="Courier New" font-size="11" fill="#aaa">E·B·r² / (Z·M)  →  substitute B_gas</text>

  <!-- Z cancellation visual -->
  <text x="675" y="338" text-anchor="middle" font-family="Courier New" font-size="15" fill="#ffffff" font-weight="bold">S = (σ(T) · r) / M</text>

  <!-- Strike through Z -->
  <text x="600" y="338" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF6B6B">Z</text>
  <line x1="594" y1="332" x2="606" y2="344" stroke="#FF6B6B" stroke-width="2"/>

  <text x="675" y="356" text-anchor="middle" font-family="Arial" font-size="10" fill="#4AFF9E">Z cancelled — mass and temperature control</text>

  <!-- Bottom caption -->
  <text x="450" y="415" text-anchor="middle" font-family="Arial" font-size="12" fill="#445" font-style="italic">Same geometry. Different phase. Charge disappears as controlling variable.</text>
</svg>
