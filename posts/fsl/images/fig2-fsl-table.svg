  <rect x="15" y="218" width="870" height="52" rx="0" fill="#050d14"/>
  <text x="100" y="236" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#67e8f9">WF Collapse</text>
  <text x="100" y="253" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569">measurement</text>
  <text x="320" y="236" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">Instantaneous discontinuous</text>
  <text x="320" y="253" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b">jump to definite state</text>
