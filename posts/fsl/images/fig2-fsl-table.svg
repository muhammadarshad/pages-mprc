  <rect width="900" height="480" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Seven Quantum Phenomena — QM Ontology vs FSL Thesis</text>

  <!-- Header row -->
