<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050818"/>
      <stop offset="50%" style="stop-color:#0a0f2e"/>
      <stop offset="100%" style="stop-color:#010510"/>
    </linearGradient>
    <radialGradient id="fanBlur" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.7"/>
      <stop offset="70%" style="stop-color:#6366f1;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Divider -->
  <line x1="600" y1="80" x2="600" y2="530" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ===== LEFT PANEL: Fan slow ===== -->
  <text x="300" y="78" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#64748b">OBSERVER BELOW BANDWIDTH</text>
  <text x="300" y="96" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#475569">Fan at low RPM — three blades resolved</text>

  <!-- Fan hub -->
  <circle cx="300" cy="310" r="16" fill="#334155"/>

  <!-- 3 fan blades at 0°, 120°, 240° -->
  <!-- Blade 1: 0° (top) -->
  <ellipse cx="300" cy="210" rx="22" ry="80" fill="#818cf8" opacity="0.85" transform="rotate(0, 300, 310)"/>
  <!-- Blade 2: 120° -->
  <ellipse cx="300" cy="210" rx="22" ry="80" fill="#818cf8" opacity="0.85" transform="rotate(120, 300, 310)"/>
  <!-- Blade 3: 240° -->
  <ellipse cx="300" cy="210" rx="22" ry="80" fill="#818cf8" opacity="0.85" transform="rotate(240, 300, 310)"/>

  <circle cx="300" cy="310" r="16" fill="#475569"/>
  <circle cx="300" cy="310" r="6" fill="#e2e8f0"/>

  <!-- Annotation: blades visible -->
  <text x="145" y="192" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc">blade 1</text>
  <text x="380" y="370" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc">blade 2</text>
  <text x="145" y="420" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a5b4fc">blade 3</text>

  <!-- Tick marks showing definite positions -->
  <text x="300" y="490" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#4ade80">&#x2714; Definite positions</text>
  <text x="300" y="508" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Observer bandwidth &#x2265; traversal speed</text>

  <!-- ===== RIGHT PANEL: Fan fast (disc) ===== -->
  <text x="900" y="78" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#64748b">OBSERVER ABOVE BANDWIDTH LIMIT</text>
  <text x="900" y="96" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#475569">Fan at high RPM — blades blur into disc</text>

  <!-- Fan disc (blur) -->
  <circle cx="900" cy="310" r="105" fill="url(#fanBlur)" opacity="0.9"/>
  <circle cx="900" cy="310" r="105" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner ring showing rotation -->
  <circle cx="900" cy="310" r="60" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3" stroke-dasharray="3 5"/>
  <circle cx="900" cy="310" r="80" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.2" stroke-dasharray="2 7"/>

  <!-- Phantom blades barely visible -->
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(0, 900, 310)"/>
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(60, 900, 310)"/>
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(120, 900, 310)"/>
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(180, 900, 310)"/>
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(240, 900, 310)"/>
  <ellipse cx="900" cy="230" rx="22" ry="75" fill="#4f46e5" opacity="0.08" transform="rotate(300, 900, 310)"/>

  <circle cx="900" cy="310" r="16" fill="#475569"/>
  <circle cx="900" cy="310" r="6" fill="#e2e8f0"/>

  <!-- Question marks on disc -->
  <text x="870" y="250" font-family="'Segoe UI', sans-serif" font-size="18" fill="#818cf8" opacity="0.6">?</text>
  <text x="940" y="330" font-family="'Segoe UI', sans-serif" font-size="18" fill="#818cf8" opacity="0.6">?</text>
  <text x="865" y="380" font-family="'Segoe UI', sans-serif" font-size="18" fill="#818cf8" opacity="0.6">?</text>

  <!-- Annotation: disc -->
  <text x="900" y="490" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#ef4444">The disc is NOT a new object</text>
  <text x="900" y="508" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">It is the observer&#x2019;s bandwidth failure made visible</text>

  <!-- Center label -->
  <rect x="480" y="272" width="240" height="78" rx="10" fill="#0a0f2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="600" y="295" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c084fc" font-weight="700">FSL OBSERVATION THESIS</text>
  <text x="600" y="313" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">The blur is in the observer.</text>
  <text x="600" y="329" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#94a3b8">The blades are always definite.</text>
  <text x="600" y="345" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="10" fill="#7c3aed">&#x201C;Superposition&#x201D; = blur artifact</text>

  <!-- Title -->
  <text x="600" y="578" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Superposition Is a Blur</text>
  <text x="600" y="602" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8" letter-spacing="2">FSL OBSERVATION THESIS  &#xB7;  OBSERVER BANDWIDTH  &#xB7;  Z&#x2082;&#x2085;&#x2086; RING GEOMETRY</text>
</svg>
