<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" style="background:#0a0f1e">
  <defs>
    <radialGradient id="sphereglow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#1a3a6a;stop-opacity:0.15"/>
      <stop offset="60%" style="stop-color:#0d1e3a;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eyeglow3d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="40%" style="stop-color:#4A9EFF;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eyefill3d" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a0d4ff;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#4A9EFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a3a8f;stop-opacity:0.3"/>
    </radialGradient>
    <filter id="gf3d">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyesoft">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">QH4 — 3D SPHERE WITH +1D CLOSING AXIS</text>
  <text x="450" y="56" text-anchor="middle" font-family="Arial" font-size="11" fill="#445" letter-spacing="2">3D SPATIAL STRUCTURE + u-AXIS (SPINOR) = CLOSED OBJECT</text>

  <g transform="translate(450, 330)">

    <!-- ═══════════════════════════════ -->
    <!-- SPHERE WIREFRAME — transparent -->
    <!-- ═══════════════════════════════ -->

    <!-- Sphere ambient glow -->
    <circle cx="0" cy="0" r="210" fill="url(#sphereglow)"/>

    <!-- Back hemisphere meridians (behind, drawn first, dimmer) -->
    <!-- Vertical meridian back -->
    <ellipse cx="0" cy="0" rx="70" ry="210" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.4" stroke-dasharray="4,4"/>
    <!-- Diagonal meridian back 1 -->
    <ellipse cx="0" cy="0" rx="140" ry="210" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
    <!-- Horizontal latitude lines back — upper -->
    <ellipse cx="0" cy="-105" rx="182" ry="50" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>
    <!-- Horizontal latitude lines back — lower -->
    <ellipse cx="0" cy="105" rx="182" ry="50" fill="none" stroke="#1a2a4a" stroke-width="0.8" opacity="0.3" stroke-dasharray="4,4"/>

    <!-- Outer sphere circle -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#2a4a8f" stroke-width="1.5" opacity="0.6"/>

    <!-- Front hemisphere meridians (in front, brighter) -->
    <!-- Vertical meridian front -->
    <ellipse cx="0" cy="0" rx="70" ry="210" fill="none" stroke="#2a4a8f" stroke-width="1" opacity="0.5"/>
    <!-- Diagonal meridian front -->
    <ellipse cx="0" cy="0" rx="140" ry="210" fill="none" stroke="#2a4a8f" stroke-width="1" opacity="0.4"/>
    <!-- Latitude front upper -->
    <ellipse cx="0" cy="-105" rx="182" ry="50" fill="none" stroke="#2a4a8f" stroke-width="1" opacity="0.4"/>
    <!-- Latitude front lower -->
    <ellipse cx="0" cy="105" rx="182" ry="50" fill="none" stroke="#2a4a8f" stroke-width="1" opacity="0.4"/>

    <!-- ═══════════════════════════════════════════ -->
    <!-- QH4 RING AT EQUATOR — in 3D perspective    -->
    <!-- The equatorial band sits on the sphere      -->
    <!-- ═══════════════════════════════════════════ -->

    <!-- Equatorial ring back half (behind sphere center, dimmer) -->
    <path d="M -210,0 A 210,55 0 0,0 210,0" fill="none" stroke="#2a5a9f" stroke-width="2" opacity="0.3" stroke-dasharray="5,3"/>

    <!-- Equatorial ring band fill — thin band -->
    <path d="M -210,0 A 210,55 0 0,1 210,0 A 210,55 0 0,1 -210,0 Z" 
          fill="#1a3a6a" opacity="0.15"/>

    <!-- Equatorial ring front half -->
    <path d="M -210,0 A 210,55 0 0,1 210,0" fill="none" stroke="#4A9EFF" stroke-width="2.5" opacity="0.8"/>

    <!-- QH4 quadrant division marks on equatorial ring -->
    <!-- 4 points at 0°, 90°, 180°, 270° of the ring = vacuum boundaries -->

    <!-- Vacuum point: right (state 64) -->
    <circle cx="210" cy="0" r="8" fill="#FF6B6B" filter="url(#gf3d)" opacity="0.7"/>
    <circle cx="210" cy="0" r="5" fill="#FF6B6B"/>

    <!-- Vacuum point: left (state 192) -->
    <circle cx="-210" cy="0" r="8" fill="#FF6B6B" filter="url(#gf3d)" opacity="0.7"/>
    <circle cx="-210" cy="0" r="5" fill="#FF6B6B"/>

    <!-- Vacuum point: front-right (state 0) — on front of equator -->
    <circle cx="0" cy="-55" r="8" fill="#FF6B6B" filter="url(#gf3d)" opacity="0.85"/>
    <circle cx="0" cy="-55" r="5" fill="#FF6B6B"/>

    <!-- Vacuum point: back (state 128) — on back of equator, dimmer -->
    <circle cx="0" cy="55" r="7" fill="#FF6B6B" opacity="0.4"/>
    <circle cx="0" cy="55" r="4" fill="#FF6B6B" opacity="0.5"/>

    <!-- Quadrant arc labels on ring -->
    <text x="120" y="-35" text-anchor="middle" font-family="Arial" font-size="12" fill="#4A9EFF" font-weight="bold">Q₁</text>
    <text x="120" y="42" text-anchor="middle" font-family="Arial" font-size="12" fill="#4A9EFF" font-weight="bold">Q₂</text>
    <text x="-120" y="42" text-anchor="middle" font-family="Arial" font-size="12" fill="#4A9EFF" font-weight="bold">Q₃</text>
    <text x="-120" y="-35" text-anchor="middle" font-family="Arial" font-size="12" fill="#4A9EFF" font-weight="bold">Q₄</text>

    <!-- State dots on front equatorial ring -->
    <g fill="#3a6abf" opacity="0.6">
      <circle cx="190" cy="-30" r="3"/>
      <circle cx="160" cy="-46" r="3"/>
      <circle cx="120" cy="-53" r="3"/>
      <circle cx="75" cy="-55" r="3"/>
      <circle cx="30" cy="-55" r="3"/>
      <circle cx="-30" cy="-55" r="3"/>
      <circle cx="-75" cy="-55" r="3"/>
      <circle cx="-120" cy="-53" r="3"/>
      <circle cx="-160" cy="-46" r="3"/>
      <circle cx="-190" cy="-30" r="3"/>
      <circle cx="-190" cy="30" r="3"/>
      <circle cx="-160" cy="46" r="3"/>
      <circle cx="-120" cy="53" r="3"/>
      <circle cx="-75" cy="55" r="3"/>
      <circle cx="-30" cy="55" r="3"/>
      <circle cx="30" cy="55" r="3"/>
      <circle cx="75" cy="55" r="3"/>
      <circle cx="120" cy="53" r="3"/>
      <circle cx="160" cy="46" r="3"/>
      <circle cx="190" cy="30" r="3"/>
    </g>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- U-AXIS: Vertical spinor eye through north-south pole -->
    <!-- This is the +1D closing dimension                   -->
    <!-- Eye shape elongated vertically along polar axis     -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Axis line — full vertical through sphere (behind, dim) -->
    <line x1="0" y1="-210" x2="0" y2="210" stroke="#4A9EFF" stroke-width="1" opacity="0.15" stroke-dasharray="3,4"/>

    <!-- The polar eye — elongated vertically -->
    <!-- Two arcs meeting at north and south poles -->
    <!-- Eye width ~50, height ~210 (pole to pole) -->

    <!-- Eye glow background -->
    <path d="M 0,-210 A 60,210 0 0,1 0,210 A 60,210 0 0,1 0,-210 Z"
          fill="#1a3a6a" opacity="0.25" filter="url(#softglow)"/>

    <!-- Eye fill -->
    <path d="M 0,-210 A 60,210 0 0,1 0,210 A 60,210 0 0,1 0,-210 Z"
          fill="url(#eyefill3d)" opacity="0.2"/>

    <!-- Eye left arc -->
    <path d="M 0,-210 A 60,210 0 0,0 0,210"
          fill="none" stroke="#4A9EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- Eye right arc -->
    <path d="M 0,-210 A 60,210 0 0,1 0,210"
          fill="none" stroke="#4A9EFF" stroke-width="1.8" opacity="0.6"/>

    <!-- North pole tip — glowing point -->
    <circle cx="0" cy="-210" r="8" fill="#4A9EFF" filter="url(#softglow)" opacity="0.5"/>
    <circle cx="0" cy="-210" r="5" fill="#ffffff" opacity="0.95"/>

    <!-- South pole tip -->
    <circle cx="0" cy="210" r="8" fill="#4A9EFF" filter="url(#softglow)" opacity="0.5"/>
    <circle cx="0" cy="210" r="5" fill="#ffffff" opacity="0.95"/>

    <!-- Center of eye — the true spinor center -->
    <circle cx="0" cy="0" r="7" fill="#4A9EFF" filter="url(#eyesoft)" opacity="0.6"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.95"/>

    <!-- Spin-up circle (upper half of eye) indicator -->
    <path d="M 0,-210 A 60,105 0 0,1 0,0"
          fill="none" stroke="#7ACBFF" stroke-width="1" opacity="0.3" stroke-dasharray="2,3"/>
    <!-- Spin-down circle (lower half) indicator -->
    <path d="M 0,0 A 60,105 0 0,1 0,210"
          fill="none" stroke="#7ACBFF" stroke-width="1" opacity="0.3" stroke-dasharray="2,3"/>

    <!-- Formula at eye center -->
    <text x="52" y="4" font-family="Arial" font-size="10" fill="#6AB8FF" opacity="0.8">[(a+b)²(c+d)²]²</text>
    <line x1="8" y1="0" x2="48" y2="0" stroke="#4A9EFF" stroke-width="0.8" opacity="0.4"/>

    <!-- u label -->
    <text x="-18" y="4" text-anchor="middle" font-family="Arial" font-size="13" fill="#ffffff" opacity="0.8" font-style="italic">u</text>

  </g>

  <!-- External annotations -->

  <!-- North pole label -->
  <text x="470" y="122" font-family="Arial" font-size="10" fill="#4A9EFF">spin ↑</text>
  <text x="470" y="135" font-family="Arial" font-size="10" fill="#4A9EFF">+1D pole</text>

  <!-- South pole label -->
  <text x="470" y="548" font-family="Arial" font-size="10" fill="#4A9EFF">spin ↓</text>
  <text x="470" y="561" font-family="Arial" font-size="10" fill="#4A9EFF">+1D pole</text>

  <!-- Ring label -->
  <line x1="660" y1="330" x2="720" y2="310" stroke="#4A9EFF" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="730" y="305" font-family="Arial" font-size="10" fill="#4A9EFF">QH4 ring</text>
  <text x="730" y="318" font-family="Arial" font-size="10" fill="#4A9EFF">equatorial</text>
  <text x="730" y="331" font-family="Arial" font-size="10" fill="#4A9EFF">256 states</text>

  <!-- Vacuum label -->
  <line x1="660" y1="330" x2="700" y2="360" stroke="#FF6B6B" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,3"/>
  <text x="710" y="370" font-family="Arial" font-size="10" fill="#FF9A9A">● vacuum</text>
  <text x="710" y="383" font-family="Arial" font-size="10" fill="#FF9A9A">boundaries</text>
  <text x="710" y="396" font-family="Arial" font-size="10" fill="#FF9A9A">{0,64,128,192}</text>

  <!-- 3D+1D label -->
  <text x="170" y="310" text-anchor="middle" font-family="Arial" font-size="11" fill="#667">3D</text>
  <text x="170" y="326" text-anchor="middle" font-family="Arial" font-size="11" fill="#667">spatial</text>
  <text x="170" y="342" text-anchor="middle" font-family="Arial" font-size="11" fill="#667">structure</text>
  <line x1="200" y1="326" x2="240" y2="326" stroke="#2a4a6a" stroke-width="1" opacity="0.5"/>

  <text x="170" y="380" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">+1D</text>
  <text x="170" y="396" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">closing</text>
  <text x="170" y="412" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">spinor axis</text>
  <line x1="200" y1="396" x2="390" y2="330" stroke="#4A9EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Bottom note -->
  <text x="450" y="598" text-anchor="middle" font-family="Arial" font-size="11" fill="#334" font-style="italic">The u-axis threads pole to pole — not a spatial dimension — it is the tension T that holds the sphere closed</text>
</svg>
