<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" style="background:#0a0f1e">
  <defs>
    <radialGradient id="ug" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#4A9EFF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="cornerg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="bfield" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#4A9EFF;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#4A9EFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="uglow2">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Arial" font-size="15" fill="#888" letter-spacing="3">QH4 UNIT CELL — 12 + 4</text>
  <text x="450" y="54" text-anchor="middle" font-family="Arial" font-size="11" fill="#445" letter-spacing="2">12 SPATIAL EDGES + 4 TENSION THREADS FROM u = ONE CLOSED OBJECT</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 3D BOX in isometric-style perspective                      -->
  <!-- Front face: square                                         -->
  <!-- Back face: offset up-right (isometric projection)         -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Box dimensions in 2D projection:
       Front face corners: BFL(220,420), BFR(560,420), TFL(220,160), TFR(560,160)
       Back offset: dx=+110, dy=-80
       Back corners: BBL(330,340), BBR(670,340), TBL(330,80), TBR(670,80)
  -->

  <g transform="translate(0,0)">

    <!-- ─── B FIELD HALO ─── -->
    <ellipse cx="450" cy="290" rx="260" ry="200" fill="url(#bfield)" opacity="0.8"/>

    <!-- ─── BACK FACE EDGES (drawn first, dimmer = depth) ─── -->
    <!-- Back top edge -->
    <line x1="330" y1="80" x2="670" y2="80" stroke="#2a4a8f" stroke-width="1.8" opacity="0.5"/>
    <!-- Back left edge -->
    <line x1="330" y1="80" x2="330" y2="340" stroke="#2a4a8f" stroke-width="1.8" opacity="0.5"/>
    <!-- Back right edge -->
    <line x1="670" y1="80" x2="670" y2="340" stroke="#2a4a8f" stroke-width="1.8" opacity="0.5"/>
    <!-- Back bottom edge -->
    <line x1="330" y1="340" x2="670" y2="340" stroke="#2a4a8f" stroke-width="1.8" opacity="0.5"/>

    <!-- ─── DEPTH EDGES (connecting front to back) ─── -->
    <!-- Top-left depth -->
    <line x1="220" y1="160" x2="330" y2="80" stroke="#2a5aaf" stroke-width="1.8" opacity="0.55" stroke-dasharray="6,3"/>
    <!-- Top-right depth -->
    <line x1="560" y1="160" x2="670" y2="80" stroke="#2a5aaf" stroke-width="1.8" opacity="0.55"/>
    <!-- Bottom-left depth -->
    <line x1="220" y1="420" x2="330" y2="340" stroke="#2a5aaf" stroke-width="1.8" opacity="0.55" stroke-dasharray="6,3"/>
    <!-- Bottom-right depth -->
    <line x1="560" y1="420" x2="670" y2="340" stroke="#2a5aaf" stroke-width="1.8" opacity="0.55"/>

    <!-- ─── FRONT FACE EDGES (drawn on top, brightest) ─── -->
    <!-- Front top edge -->
    <line x1="220" y1="160" x2="560" y2="160" stroke="#4A9EFF" stroke-width="2.5" opacity="0.9"/>
    <!-- Front left edge -->
    <line x1="220" y1="160" x2="220" y2="420" stroke="#4A9EFF" stroke-width="2.5" opacity="0.9"/>
    <!-- Front right edge -->
    <line x1="560" y1="160" x2="560" y2="420" stroke="#4A9EFF" stroke-width="2.5" opacity="0.9"/>
    <!-- Front bottom edge -->
    <line x1="220" y1="420" x2="560" y2="420" stroke="#4A9EFF" stroke-width="2.5" opacity="0.9"/>

    <!-- ─── EDGE COUNT LABELS ─── -->
    <!-- Front face: 4 edges -->
    <text x="390" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF" opacity="0.6">①</text>
    <text x="207" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF" opacity="0.6">②</text>
    <text x="574" y="295" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF" opacity="0.6">③</text>
    <text x="390" y="436" text-anchor="middle" font-family="Arial" font-size="10" fill="#4A9EFF" opacity="0.6">④</text>
    <!-- Back face: 4 edges -->
    <text x="500" y="72" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a5aaf" opacity="0.6">⑤</text>
    <text x="318" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a5aaf" opacity="0.6">⑥</text>
    <text x="682" y="212" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a5aaf" opacity="0.6">⑦</text>
    <text x="500" y="355" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a5aaf" opacity="0.6">⑧</text>
    <!-- Depth edges: 4 -->
    <text x="268" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a6abf" opacity="0.6">⑨</text>
    <text x="616" y="116" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a6abf" opacity="0.6">⑩</text>
    <text x="268" y="392" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a6abf" opacity="0.6">⑪</text>
    <text x="616" y="392" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a6abf" opacity="0.6">⑫</text>

    <!-- ─── 8 CORNER NODES ─── -->
    <!-- Front face corners -->
    <circle cx="220" cy="160" r="12" fill="url(#cornerg)" opacity="0.7" filter="url(#cg)"/>
    <circle cx="220" cy="160" r="7" fill="#FFD700" opacity="0.95"/>

    <circle cx="560" cy="160" r="12" fill="url(#cornerg)" opacity="0.7" filter="url(#cg)"/>
    <circle cx="560" cy="160" r="7" fill="#FFD700" opacity="0.95"/>

    <circle cx="220" cy="420" r="12" fill="url(#cornerg)" opacity="0.7" filter="url(#cg)"/>
    <circle cx="220" cy="420" r="7" fill="#FFD700" opacity="0.95"/>

    <circle cx="560" cy="420" r="12" fill="url(#cornerg)" opacity="0.7" filter="url(#cg)"/>
    <circle cx="560" cy="420" r="7" fill="#FFD700" opacity="0.95"/>

    <!-- Back face corners (dimmer = depth) -->
    <circle cx="330" cy="80"  r="10" fill="url(#cornerg)" opacity="0.45" filter="url(#cg)"/>
    <circle cx="330" cy="80"  r="6" fill="#FFD700" opacity="0.6"/>

    <circle cx="670" cy="80"  r="10" fill="url(#cornerg)" opacity="0.45" filter="url(#cg)"/>
    <circle cx="670" cy="80"  r="6" fill="#FFD700" opacity="0.6"/>

    <circle cx="330" cy="340" r="10" fill="url(#cornerg)" opacity="0.45" filter="url(#cg)"/>
    <circle cx="330" cy="340" r="6" fill="#FFD700" opacity="0.6"/>

    <circle cx="670" cy="340" r="10" fill="url(#cornerg)" opacity="0.45" filter="url(#cg)"/>
    <circle cx="670" cy="340" r="6" fill="#FFD700" opacity="0.6"/>

    <!-- ─── U CENTER ─── -->
    <!-- Geometric center of box in projection -->
    <!-- Front face center: (390, 290) -->
    <!-- With depth offset: u sits at approximately (445, 253) -->

    <!-- 4 TENSION THREADS from u to corners -->
    <!-- u to front-top-left -->
    <line x1="445" y1="255" x2="220" y2="160" stroke="#FF6B6B" stroke-width="2" opacity="0.75" filter="url(#tg)"/>
    <!-- u to front-top-right -->
    <line x1="445" y1="255" x2="560" y2="160" stroke="#FF6B6B" stroke-width="2" opacity="0.75" filter="url(#tg)"/>
    <!-- u to front-bottom-left -->
    <line x1="445" y1="255" x2="220" y2="420" stroke="#FF6B6B" stroke-width="2" opacity="0.75" filter="url(#tg)"/>
    <!-- u to front-bottom-right -->
    <line x1="445" y1="255" x2="560" y2="420" stroke="#FF6B6B" stroke-width="2" opacity="0.75" filter="url(#tg)"/>
    <!-- u to back corners (dimmer = depth) -->
    <line x1="445" y1="255" x2="330" y2="80"  stroke="#FF6B6B" stroke-width="1.5" opacity="0.35" stroke-dasharray="5,3" filter="url(#tg)"/>
    <line x1="445" y1="255" x2="670" y2="80"  stroke="#FF6B6B" stroke-width="1.5" opacity="0.35" stroke-dasharray="5,3" filter="url(#tg)"/>
    <line x1="445" y1="255" x2="330" y2="340" stroke="#FF6B6B" stroke-width="1.5" opacity="0.35" stroke-dasharray="5,3" filter="url(#tg)"/>
    <line x1="445" y1="255" x2="670" y2="340" stroke="#FF6B6B" stroke-width="1.5" opacity="0.35" stroke-dasharray="5,3" filter="url(#tg)"/>

    <!-- Thread T labels -->
    <text x="310" y="196" font-family="Arial" font-size="11" fill="#FF6B6B" opacity="0.8" font-weight="bold">T</text>
    <text x="512" y="196" font-family="Arial" font-size="11" fill="#FF6B6B" opacity="0.8" font-weight="bold">T</text>
    <text x="310" y="360" font-family="Arial" font-size="11" fill="#FF6B6B" opacity="0.8" font-weight="bold">T</text>
    <text x="512" y="360" font-family="Arial" font-size="11" fill="#FF6B6B" opacity="0.8" font-weight="bold">T</text>

    <!-- U CENTER EYE -->
    <!-- Eye shape at u — horizontal orientation showing spinor -->
    <path d="M 415,255 A 30,18 0 0,1 475,255 A 30,18 0 0,1 415,255 Z"
          fill="#0d2040" opacity="0.85"/>
    <path d="M 415,255 A 30,18 0 0,1 475,255 A 30,18 0 0,1 415,255 Z"
          fill="none" stroke="#ffffff" stroke-width="2" opacity="0.95"/>
    <!-- Eye glow -->
    <ellipse cx="445" cy="255" rx="32" ry="20" fill="url(#ug)" opacity="0.6" filter="url(#uglow2)"/>
    <!-- Eye tips -->
    <circle cx="415" cy="255" r="3.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="475" cy="255" r="3.5" fill="#ffffff" opacity="0.95"/>
    <!-- Center point -->
    <circle cx="445" cy="255" r="4" fill="#ffffff" opacity="1"/>

    <!-- u label -->
    <text x="445" y="245" text-anchor="middle" font-family="Arial" font-size="14"
          fill="#ffffff" font-style="italic" font-weight="bold">u</text>

    <!-- Formula -->
    <text x="445" y="285" text-anchor="middle" font-family="Arial" font-size="10"
          fill="#6AB8FF" opacity="0.8">[(a+b)²(c+d)²]²</text>

  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ANNOTATIONS                                -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- 12 edges breakdown -->
  <rect x="30" y="130" width="155" height="110" rx="5" fill="#0d1525" stroke="#1a2a4a" stroke-width="1"/>
  <text x="107" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF" font-weight="bold">12 EDGES</text>
  <text x="107" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#667">①–④  front face</text>
  <text x="107" y="183" text-anchor="middle" font-family="Arial" font-size="10" fill="#445">⑤–⑧  back face</text>
  <text x="107" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a5a8f">⑨–⑫  depth edges</text>
  <text x="107" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#556" font-style="italic">3D spatial structure</text>
  <text x="107" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#556" font-style="italic">length · width · depth</text>

  <!-- 4 threads breakdown -->
  <rect x="715" y="130" width="155" height="110" rx="5" fill="#0d1525" stroke="#1a2a4a" stroke-width="1"/>
  <text x="792" y="150" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF6B6B" font-weight="bold">4 THREADS</text>
  <text x="792" y="168" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF9A9A">T → each corner pair</text>
  <text x="792" y="183" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF9A9A">inward tension T &gt; 0</text>
  <text x="792" y="198" text-anchor="middle" font-family="Arial" font-size="10" fill="#667" font-style="italic">+1D closing force</text>
  <text x="792" y="215" text-anchor="middle" font-family="Arial" font-size="10" fill="#667" font-style="italic">not a spatial direction</text>
  <text x="792" y="230" text-anchor="middle" font-family="Arial" font-size="10" fill="#667" font-style="italic">holds object closed</text>

  <!-- Corner node label -->
  <line x1="215" y1="415" x2="150" y2="460" stroke="#FFD700" stroke-width="0.8" opacity="0.5" stroke-dasharray="3,3"/>
  <text x="88" y="458" text-anchor="middle" font-family="Arial" font-size="10" fill="#FFD700">corner node</text>
  <text x="88" y="471" text-anchor="middle" font-family="Arial" font-size="10" fill="#887730">shared with</text>
  <text x="88" y="484" text-anchor="middle" font-family="Arial" font-size="10" fill="#887730">adjacent cells</text>

  <!-- B field label -->
  <line x1="174" y1="290" x2="180" y2="290" stroke="#4A9EFF" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  <text x="88" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#3a6abf">B field</text>
  <text x="88" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a4a8f">rotation of u</text>
  <text x="88" y="311" text-anchor="middle" font-family="Arial" font-size="10" fill="#2a4a8f">= magnetic shield</text>

  <!-- Key equation -->
  <rect x="260" y="488" width="380" height="52" rx="5" fill="#0d1525" stroke="#2a4a6a" stroke-width="1"/>
  <text x="450" y="508" text-anchor="middle" font-family="Arial" font-size="12" fill="#ffffff">12 edges  +  4 threads  =  one closed object</text>
  <text x="450" y="528" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A9EFF">3D structure  +  +1D closing tension  =  T(u, ∂R) &gt; 0</text>

  <!-- Bottom note -->
  <text x="450" y="584" text-anchor="middle" font-family="Arial" font-size="11" fill="#334" font-style="italic">Without the 4 threads, 12 edges are floating geometry — u and T are what make it one object</text>
  <text x="450" y="600" text-anchor="middle" font-family="Arial" font-size="11" fill="#334" font-style="italic">This is why Gabriel's Horn has no valid form — it has no u, no T, no closing condition</text>
</svg>
